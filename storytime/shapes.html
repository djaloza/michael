<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shapes">
<title>Shapes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #FFF8F0; font-family: 'Nunito', sans-serif; overflow-x: hidden; }
  body { padding-bottom: env(safe-area-inset-bottom); }
  #app { max-width: 780px; margin: 0 auto; padding: 16px 20px 32px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .logo { font-size: 24px; font-weight: 900; color: #EF476F; }
  .test-toggle { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 20px; border: 2px solid #DDE3F0; background: white; color: #9CA3AF; cursor: pointer; }
  .test-toggle.active { background: #FFF1F2; border-color: #EF476F; color: #9F1239; }
  .test-banner { background: #EF476F; border-radius: 0; padding: 4px 16px; font-size: 13px; font-weight: 800; color: white; text-align: center; margin: -16px -20px 10px; display: none; }
  .token-pill { display: flex; align-items: center; gap: 8px; background: #FFF3CD; padding: 8px 18px; border-radius: 40px; border: 2px solid #FFD166; }
  .token-pill strong { font-size: 17px; color: #7A5C00; }
  .token-board { background: white; border-radius: 24px; border: 3px solid #E8EEF8; padding: 6px 16px; margin-bottom: 6px; }
  .token-board-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .token-board-label { font-size: 14px; font-weight: 800; color: #6B7280; }
  .token-board-msg { font-size: 14px; font-weight: 800; color: #EF476F; }
  .token-circles { display: flex; gap: 8px; justify-content: center; }
  .token-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.35s; }
  .token-circle.empty  { background: #F1EFE8; border: 4px solid #D3D1C7; }
  .token-circle.filled { background: #FFD166; border: 4px solid #F5A623; box-shadow: 0 4px 12px rgba(245,166,35,0.45); transform: scale(1.08); }
  .card { background: white; border-radius: 24px; border: 3px solid #E8EEF8; padding: 12px; margin-bottom: 8px; }
  .big-btn { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; padding: 20px 52px; border-radius: 60px; border: none; cursor: pointer; min-height: 70px; touch-action: manipulation; color: white; width: 100%; }
  .big-btn.pink  { background: #EF476F; box-shadow: 0 6px 0 #b8304f; }
  .big-btn.green { background: #06D6A0; box-shadow: 0 6px 0 #04a07a; }
  .q-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .q-dot { width: 16px; height: 16px; border-radius: 50%; background: #DDE3F0; transition: background 0.3s; }
  .q-dot.done    { background: #06D6A0; }
  .q-dot.current { background: #EF476F; }
  .cat-badge { display: inline-block; font-size: 14px; font-weight: 800; padding: 5px 16px; border-radius: 24px; margin-bottom: 12px; }
  .badge-identify    { background: #FFF1F2; color: #9F1239; }
  .badge-equal_parts { background: #EEF2FF; color: #4338CA; }
  .badge-attributes  { background: #ECFDF5; color: #065F46; }
  .q-text { font-size: 26px; font-weight: 900; color: #2D2D2D; text-align: center; margin-bottom: 20px; line-height: 1.3; }
  .shape-center { display: flex; justify-content: center; margin-bottom: 18px; }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .choice-btn { border-radius: 20px; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 72px; touch-action: manipulation; border: 3px solid #DDE3F0; background: white; color: #2D2D2D; }
  .choice-btn.correct { background: #ECFDF5; border-color: #06D6A0; color: #065F46; }
  .choice-btn.wrong   { background: #FFF1F2; border-color: #EF476F; color: #9F1239; }
  .choice-btn:disabled { cursor: default; }
  .yesno-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .yesno-btn { border-radius: 28px; padding: 18px 14px; font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 900; cursor: pointer; text-align: center; min-height: 96px; touch-action: manipulation; border: 4px solid #DDE3F0; background: white; color: #2D2D2D; }
  .yesno-btn.yes-btn { border-color: #06D6A0; color: #065F46; }
  .yesno-btn.no-btn  { border-color: #EF476F; color: #9F1239; }
  .yesno-btn.correct { background: #ECFDF5; border-color: #06D6A0; }
  .yesno-btn.wrong   { background: #FFF1F2; border-color: #EF476F; }
  .yesno-btn:disabled { cursor: default; }
  .feedback { border-radius: 20px; padding: 10px 16px; font-size: 17px; font-weight: 800; text-align: center; margin-top: 10px; display: none; }
  .feedback.correct { background: #ECFDF5; color: #065F46; }
  .feedback.wrong   { background: #FFF1F2; color: #9F1239; }
  .next-btn { width: 100%; margin-top: 10px; background: #EF476F; color: white; font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; padding: 14px; border-radius: 60px; border: none; cursor: pointer; box-shadow: 0 5px 0 #b8304f; min-height: 54px; touch-action: manipulation; display: none; }
  .progress-bar-bg { width: 100%; max-width: 340px; margin: 0 auto 24px; height: 18px; background: #DDE3F0; border-radius: 9px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #EF476F; border-radius: 9px; transition: width 1s ease-out; }
  .screen { display: none; }
  .screen.active { display: block; }
  .bounce { animation: bounce 2s infinite; display: inline-block; }
  .burst { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; font-size: 120px; z-index: 9999; animation: burst 0.8s ease-out forwards; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes burst  { 0%{opacity:1;transform:scale(0.5)} 60%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1.8)} }
  .pick-btn { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; border-radius:24px; padding:16px 20px; border:none; color:white; cursor:pointer; touch-action:manipulation; width:100%; margin:0; }
  .pick-story { background:#5B8DEF; box-shadow:0 5px 0 #3a6abf; }
  .pick-math  { background:#FF9F1C; box-shadow:0 5px 0 #c97a00; }
  .pick-clock { background:#7B5EA7; box-shadow:0 5px 0 #5a4180; }
  .pick-shapes{ background:#EF476F; box-shadow:0 5px 0 #b8304f; }
  .pick-vocab { background:#06D6A0; box-shadow:0 5px 0 #04a07a; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="https://jaloza.com/michael/" style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:#9CA3AF;text-decoration:none;">← Home</a>
      <div class="logo">🔷 Shapes</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="test-toggle" id="test-toggle" onclick="toggleTestMode()">🧪 Test Mode</button>
      <div class="token-pill"><span style="font-size:20px">⭐</span><strong id="token-count">0/5</strong></div>
    </div>
  </div>
  <div class="test-banner" id="test-banner">🧪 TEST MODE — answers will NOT count toward real data</div>

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active" style="text-align:center;padding-top:12px;">
    <div class="bounce" style="font-size:96px;margin-bottom:16px;">🔷</div>
    <div style="font-size:36px;font-weight:900;color:#EF476F;margin-bottom:8px;">Hi Michael!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:6px;">Shapes · Sides · Equal Parts!</div>
    <div style="font-size:17px;color:#9CA3AF;font-weight:600;margin-bottom:28px;">Answer 1 question = 1 ⭐ · Fill 5 stars = 🎬 video!</div>
    <div id="welcome-token-board"></div>
    <button class="big-btn pink" onclick="startRound()">Let's Go! 🚀</button>
  </div>

  <!-- QUESTION -->
  <div id="screen-question" class="screen">
    <div id="q-token-board"></div>
    <div class="q-dots" id="q-dots"></div>
    <div class="card">
      <div style="text-align:center;"><span id="q-badge" class="cat-badge"></span></div>
      <div id="q-text" class="q-text"></div>
      <div id="q-main"></div>
      <div id="feedback" class="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen" style="text-align:center;padding-top:12px;">
    <div id="result-emoji" style="font-size:100px;margin-bottom:14px;display:inline-block;"></div>
    <div id="result-title" style="font-size:32px;font-weight:900;margin-bottom:8px;"></div>
    <div id="result-score" style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:24px;"></div>
    <div class="progress-bar-bg"><div id="result-bar" class="progress-bar-fill" style="width:0%;"></div></div>
    <div id="result-token-board"></div>
    <button class="big-btn green" onclick="startRound()">Play Again! 🔷</button>
  </div>

  <!-- REWARD -->
  <div id="screen-reward" class="screen" style="text-align:center;padding-top:10px;">
    <div style="font-size:100px;margin-bottom:10px;">🎬</div>
    <div style="font-size:36px;font-weight:900;color:#EF476F;margin-bottom:8px;">You earned a video!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:28px;">Awesome work, Michael! 🎉</div>
    <div id="reward-stars" style="display:flex;gap:14px;justify-content:center;margin-bottom:28px;"></div>
    <div style="background:#FFF1F2;border-radius:22px;padding:24px 28px;margin-bottom:28px;">
      <div style="font-size:16px;color:#6B7280;font-weight:600;margin-bottom:6px;">Your video reward:</div>
      <div id="yt-label" style="font-size:20px;font-weight:800;color:#EF476F;margin-bottom:16px;"></div>
      <button onclick="openYouTube()" style="background:#FF0000;color:white;font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;padding:16px 40px;border-radius:40px;border:none;cursor:pointer;touch-action:manipulation;">▶ Watch on YouTube</button>
    </div>
    <div id="yt-hint" style="font-size:14px;color:#9CA3AF;margin-bottom:24px;"></div>
    <button class="big-btn pink" onclick="resetAndStart()">Keep Playing! 🔷</button>
  </div>

  <!-- PICK NEXT -->
  <div id="screen-pick-next" class="screen" style="text-align:center;padding-top:12px;">
    <div style="font-size:28px;font-weight:900;color:#2D2D2D;margin-bottom:12px;">Round Complete! 🎉</div>
    <div id="pick-meta-board" style="margin-bottom:10px;"></div>
    <div id="pick-meta-count" style="font-size:17px;color:#FF9F1C;font-weight:800;margin-bottom:20px;"></div>
    <div style="font-size:22px;font-weight:800;color:#2D2D2D;margin-bottom:16px;">What do you want to play next?</div>
    <div style="display:grid;grid-template-columns:1fr;gap:12px;max-width:420px;margin:0 auto;">
      <button onclick="pickNext('index.html')" class="pick-btn pick-story">📚 Story Time</button>
      <button onclick="pickNext('math.html')" class="pick-btn pick-math">📐 Math Time</button>
      <button onclick="pickNext('clock.html')" class="pick-btn pick-clock">🕐 Clock Time</button>
      <button onclick="pickNext('shapes.html')" class="pick-btn pick-shapes">🔷 Shapes</button>
      <button onclick="pickNext('vocabulary.html')" class="pick-btn pick-vocab">📝 Vocabulary</button>
    </div>
  </div>
</div>

<script>
const TOKENS_NEEDED = 5;
const QUESTIONS_PER_ROUND = 5;
const LOG_URL = "https://jaloza.com/michael/iep/log.php";
const sessionId = "sh_" + Date.now();

let tokens = 0, currentQ = 0, correctCount = 0, answered = false;
let roundQuestions = [], questionStartTime = null;
let isTestMode = false, currentSearch = "";

// ---- Shape SVGs ----
const SHAPE_COLORS = {
  circle:'#FF6B6B', square:'#4ECDC4', triangle:'#FFD166',
  rectangle:'#A8E6CF', oval:'#FF8B94', diamond:'#C3B1E1',
  hexagon:'#FFD166', star:'#EF476F', pentagon:'#06D6A0', heart:'#FF6B6B'
};

function shapePath(name, c) {
  const paths = {
    circle:    `<circle cx="100" cy="100" r="85" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    square:    `<rect x="15" y="15" width="170" height="170" rx="5" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    triangle:  `<polygon points="100,12 190,188 10,188" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    rectangle: `<rect x="8" y="48" width="184" height="104" rx="5" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    oval:      `<ellipse cx="100" cy="100" rx="90" ry="58" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    diamond:   `<polygon points="100,10 190,100 100,190 10,100" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    hexagon:   `<polygon points="100,10 182,55 182,145 100,190 18,145 18,55" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    star:      `<polygon points="100,10 121,69 184,69 133,107 153,170 100,133 47,170 67,107 16,69 79,69" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    pentagon:  `<polygon points="100,10 188,73 155,176 45,176 12,73" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`,
    heart:     `<path d="M100,172 C50,142 8,110 8,64 C8,33 30,10 60,10 C76,10 91,19 100,33 C109,19 124,10 140,10 C170,10 192,33 192,64 C192,110 150,142 100,172Z" fill="${c}" stroke="#2D2D2D" stroke-width="4"/>`
  };
  return paths[name] || '';
}

function shapeSVG(name, size) {
  size = size || 180;
  const c = SHAPE_COLORS[name] || '#5B8DEF';
  return `<svg viewBox="0 0 200 200" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${shapePath(name,c)}</svg>`;
}

// ---- Question pools ----
const SHAPE_NAMES = ['circle','square','triangle','rectangle','oval','diamond','hexagon','star','pentagon','heart'];

// Mode A — identify
const IDENTIFY_QS = SHAPE_NAMES.map(name => ({
  mode: 'identify',
  q: 'What shape is this?',
  qLabel: `What shape is this?`,
  shapeName: name,
  answer: name,
  wrongChoices: SHAPE_NAMES.filter(s => s !== name)
}));

// Mode C — attributes
const ATTR_QS = [
  {mode:'attributes', q:'How many sides does this shape have?', shapeName:'triangle',   answer:'3', wrongs:['4','5','6']},
  {mode:'attributes', q:'How many corners does this shape have?', shapeName:'triangle', answer:'3', wrongs:['4','2','0']},
  {mode:'attributes', q:'How many sides does this shape have?', shapeName:'square',     answer:'4', wrongs:['3','5','6']},
  {mode:'attributes', q:'How many corners does this shape have?', shapeName:'square',   answer:'4', wrongs:['3','2','0']},
  {mode:'attributes', q:'How many sides does this shape have?', shapeName:'rectangle',  answer:'4', wrongs:['3','5','6']},
  {mode:'attributes', q:'How many sides does this shape have?', shapeName:'pentagon',   answer:'5', wrongs:['4','6','3']},
  {mode:'attributes', q:'How many corners does this shape have?', shapeName:'pentagon', answer:'5', wrongs:['4','6','3']},
  {mode:'attributes', q:'How many sides does this shape have?', shapeName:'hexagon',    answer:'6', wrongs:['5','4','8']},
  {mode:'attributes', q:'How many corners does this shape have?', shapeName:'hexagon',  answer:'6', wrongs:['5','4','8']},
  {mode:'attributes', q:'How many sides does a circle have?', shapeName:'circle',       answer:'0', wrongs:['1','2','4']},
  {mode:'attributes', q:'How many corners does a star have?', shapeName:'star',         answer:'10', wrongs:['5','8','6']},
  {mode:'attributes', q:'How many sides does a diamond have?', shapeName:'diamond',     answer:'4', wrongs:['3','5','6']},
];

// Mode B — equal parts (hardcoded SVG + question)
function makeSVG(inner, size) {
  return `<svg viewBox="0 0 200 200" width="${size||180}" height="${size||180}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

const EQUAL_QS = [
  // equal: circle halved vertically
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<circle cx="100" cy="100" r="85" fill="#FF6B6B" stroke="#2D2D2D" stroke-width="4"/><line x1="100" y1="15" x2="100" y2="185" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'Yes', choices:['Yes','No'] },
  // unequal: circle line off-center
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<circle cx="100" cy="100" r="85" fill="#FF6B6B" stroke="#2D2D2D" stroke-width="4"/><line x1="60" y1="20" x2="80" y2="185" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'No', choices:['Yes','No'] },
  // equal: square into 4
  { mode:'equal_parts', q:'How many equal parts?',
    svg: makeSVG(`<rect x="15" y="15" width="170" height="170" rx="4" fill="#4ECDC4" stroke="#2D2D2D" stroke-width="4"/><line x1="100" y1="15" x2="100" y2="185" stroke="#2D2D2D" stroke-width="3"/><line x1="15" y1="100" x2="185" y2="100" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'4', choices:['2','4','6','3'] },
  // equal: rectangle into 3 columns
  { mode:'equal_parts', q:'How many equal parts?',
    svg: makeSVG(`<rect x="8" y="48" width="184" height="104" rx="4" fill="#A8E6CF" stroke="#2D2D2D" stroke-width="4"/><line x1="69" y1="48" x2="69" y2="152" stroke="#2D2D2D" stroke-width="3"/><line x1="131" y1="48" x2="131" y2="152" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'3', choices:['2','3','4','6'] },
  // equal: circle into halves horizontal
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<circle cx="100" cy="100" r="85" fill="#C3B1E1" stroke="#2D2D2D" stroke-width="4"/><line x1="15" y1="100" x2="185" y2="100" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'Yes', choices:['Yes','No'] },
  // unequal: rectangle line not in center
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<rect x="8" y="48" width="184" height="104" rx="4" fill="#A8E6CF" stroke="#2D2D2D" stroke-width="4"/><line x1="70" y1="48" x2="70" y2="152" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'No', choices:['Yes','No'] },
  // equal: square into 2 halves
  { mode:'equal_parts', q:'How many equal parts?',
    svg: makeSVG(`<rect x="15" y="15" width="170" height="170" rx="4" fill="#FFD166" stroke="#2D2D2D" stroke-width="4"/><line x1="100" y1="15" x2="100" y2="185" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'2', choices:['2','3','4','6'] },
  // equal: circle into 3 equal slices
  { mode:'equal_parts', q:'How many equal parts?',
    svg: makeSVG(`<circle cx="100" cy="100" r="85" fill="#06D6A0" stroke="#2D2D2D" stroke-width="4"/><line x1="100" y1="15" x2="100" y2="100" stroke="#2D2D2D" stroke-width="3"/><line x1="100" y1="100" x2="26" y2="143" stroke="#2D2D2D" stroke-width="3"/><line x1="100" y1="100" x2="174" y2="143" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'3', choices:['2','3','4','6'] },
  // unequal: square with diagonal
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<rect x="15" y="15" width="170" height="170" rx="4" fill="#4ECDC4" stroke="#2D2D2D" stroke-width="4"/><line x1="15" y1="15" x2="185" y2="185" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'Yes', choices:['Yes','No'] },
  // equal: rectangle halved
  { mode:'equal_parts', q:'Are these equal parts?',
    svg: makeSVG(`<rect x="8" y="48" width="184" height="104" rx="4" fill="#FF8B94" stroke="#2D2D2D" stroke-width="4"/><line x1="100" y1="48" x2="100" y2="152" stroke="#2D2D2D" stroke-width="3"/>`),
    answer:'Yes', choices:['Yes','No'] },
];

// ---- Build round ----
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildRound() {
  const pool = [
    ...shuffle(IDENTIFY_QS).slice(0,2),
    ...shuffle(ATTR_QS).slice(0,1),
    ...shuffle(EQUAL_QS).slice(0,2)
  ];
  roundQuestions = shuffle(pool).slice(0, QUESTIONS_PER_ROUND);
}

function startRound() {
  buildRound();
  currentQ = 0; correctCount = 0; answered = false;
  renderTokenBoard('q-token-board');
  renderQuestion();
  showScreen('question');
}

function renderQuestion() {
  const q = roundQuestions[currentQ];
  renderTokenBoard('q-token-board');
  document.getElementById('q-dots').innerHTML = roundQuestions.map((_,i) =>
    `<div class="q-dot ${i<currentQ?'done':i===currentQ?'current':''}"></div>`).join('');

  const badge = document.getElementById('q-badge');
  const modeLabels = {identify:'🔷 Name the Shape', equal_parts:'✂️ Equal Parts', attributes:'🔢 Count Sides'};
  badge.textContent  = modeLabels[q.mode] || q.mode;
  badge.className = 'cat-badge badge-' + q.mode;

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
  questionStartTime = Date.now();

  const main = document.getElementById('q-main');

  if (q.mode === 'identify') {
    const wrongSet = shuffle(q.wrongChoices).slice(0,3);
    const choices = shuffle([q.answer, ...wrongSet]);
    main.innerHTML = `
      <div class="shape-center">${shapeSVG(q.shapeName, 180)}</div>
      <div class="choice-grid">${choices.map((c,i) =>
        `<button class="choice-btn" id="ch-${i}" onclick="handleTextAnswer('${c}','${q.answer}',${i},'${q.mode}','${q.q}')">${c}</button>`
      ).join('')}</div>`;
  } else if (q.mode === 'attributes') {
    const choices = shuffle([q.answer, ...q.wrongs]);
    main.innerHTML = `
      <div class="shape-center">${shapeSVG(q.shapeName, 180)}</div>
      <div class="choice-grid">${choices.map((c,i) =>
        `<button class="choice-btn" id="ch-${i}" onclick="handleTextAnswer('${c}','${q.answer}',${i},'${q.mode}','${q.q}')">${c}</button>`
      ).join('')}</div>`;
  } else {
    // equal_parts — might be yes/no or number choices
    const choices = q.choices;
    const isYesNo = choices.length === 2 && choices.includes('Yes') && choices.includes('No');
    if (isYesNo) {
      main.innerHTML = `
        <div class="shape-center">${q.svg}</div>
        <div class="yesno-grid">
          <button class="yesno-btn yes-btn" id="ch-0" onclick="handleTextAnswer('Yes','${q.answer}',0,'${q.mode}','')" >✅ Yes</button>
          <button class="yesno-btn no-btn"  id="ch-1" onclick="handleTextAnswer('No','${q.answer}',1,'${q.mode}','')" >❌ No</button>
        </div>`;
    } else {
      main.innerHTML = `
        <div class="shape-center">${q.svg}</div>
        <div class="choice-grid">${choices.map((c,i) =>
          `<button class="choice-btn" id="ch-${i}" onclick="handleTextAnswer('${c}','${q.answer}',${i},'${q.mode}','')">${c}</button>`
        ).join('')}</div>`;
    }
  }
}

function handleTextAnswer(chosen, correct, idx, mode, qText) {
  if (answered) return;
  answered = true;
  const isCorrect = chosen === correct;
  logAnswer(isCorrect, chosen, mode, qText || roundQuestions[currentQ].q);

  document.querySelectorAll('#q-main button').forEach((btn, i) => {
    btn.disabled = true;
    const val = btn.textContent.replace(/✅\s*|❌\s*/,'').trim();
    const btnVal = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1] || '';
    if (i === idx) btn.classList.add(isCorrect ? 'correct' : 'wrong');
    else if (btnVal === correct || btn.textContent.includes(correct)) btn.classList.add('correct');
  });
  // simpler: re-check by id
  document.querySelectorAll('#q-main button').forEach((btn) => {
    const onclick = btn.getAttribute('onclick') || '';
    const firstArg = onclick.match(/handleTextAnswer\('([^']+)'/)?.[1];
    if (firstArg === correct) btn.classList.add('correct');
  });

  if (tokens < TOKENS_NEEDED) tokens++;
  document.getElementById('token-count').textContent = tokens + '/' + TOKENS_NEEDED;
  renderTokenBoard('q-token-board');
  if (isCorrect) {
    correctCount++;
    showBurst();
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '⭐ Amazing! That\'s right!' : 'Good try! The answer is: ' + correct;
  fb.style.display = 'block';

  if (tokens >= TOKENS_NEEDED && localStorage.getItem('tokenMode') !== 'session') {
    setTimeout(showReward, 1100);
  } else {
    const nb = document.getElementById('next-btn');
    nb.textContent = currentQ < QUESTIONS_PER_ROUND-1 ? 'Next ➡️' : 'See My Score! 🏆';
    nb.style.display = 'block';
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ < QUESTIONS_PER_ROUND) renderQuestion();
  else if (localStorage.getItem('tokenMode') === 'session') sessionRoundComplete();
  else showResult();
}

function showResult() {
  const pct = Math.round((correctCount / QUESTIONS_PER_ROUND) * 100);
  document.getElementById('result-emoji').textContent = pct>=80?'🏆':pct>=60?'🌟':'💪';
  document.getElementById('result-title').textContent = pct>=80?'Amazing job, Michael!':pct>=60?'Great work, Michael!':'Keep going, Michael!';
  document.getElementById('result-score').textContent = 'You got '+correctCount+' out of '+QUESTIONS_PER_ROUND+' right!';
  renderTokenBoard('result-token-board');
  showScreen('result');
  setTimeout(() => { document.getElementById('result-bar').style.width = pct+'%'; }, 100);
}

function showReward() {
  const searches = ["Bluey full episodes kids","Mario Bros cartoon for kids","Minecraft funny animation kids",
    "Pokemon cartoon episodes kids","SpongeBob funny moments","cartoon funny animals kids",
    "Paw Patrol episodes","funny video game cartoons kids"];
  currentSearch = searches[Math.floor(Math.random()*searches.length)];
  document.getElementById('yt-label').textContent = '"'+currentSearch+'"';
  document.getElementById('yt-hint').textContent  = 'Search "'+currentSearch+'" on YouTube if button doesn\'t open';
  document.getElementById('reward-stars').innerHTML = Array.from({length:TOKENS_NEEDED}).map(() =>
    `<div style="width:64px;height:64px;border-radius:50%;background:#FFD166;border:4px solid #F5A623;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 12px rgba(245,166,35,0.5);">⭐</div>`).join('');
  showScreen('reward');
}

function openYouTube() {
  window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(currentSearch)+'&sp=EgIYAQ%3D%3D','_blank');
}

function sessionRoundComplete() {
  tokens = 0;
  document.getElementById('token-count').textContent = '0/'+TOKENS_NEEDED;
  const meta = parseInt(localStorage.getItem('metaTokens') || '0') + 1;
  if (meta >= 5) {
    localStorage.setItem('metaTokens', '5');
    window.location.href = '../';
  } else {
    localStorage.setItem('metaTokens', meta);
    const left = 5 - meta;
    document.getElementById('pick-meta-board').innerHTML =
      '<div style="display:flex;gap:10px;justify-content:center;">' +
      Array.from({length:5},(_,i)=>`<div style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;${i<meta?'background:#FFD166;border:4px solid #F5A623;':'background:#F1EFE8;border:4px solid #D3D1C7;'}">${i<meta?'⭐':''}</div>`).join('') +
      '</div>';
    document.getElementById('pick-meta-count').textContent =
      meta + ' of 5 rounds done · ' + left + ' more for your video!';
    showScreen('pick-next');
  }
}

function resetAndStart_tokens() {
  tokens = 0;
  document.getElementById('token-count').textContent = '0/'+TOKENS_NEEDED;
}

function pickNext(url) {
  localStorage.setItem('launchDirect', '1');
  window.location.href = url;
}

function resetAndStart() {
  tokens = 0;
  document.getElementById('token-count').textContent = '0/'+TOKENS_NEEDED;
  startRound();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function showBurst() {
  const el = document.createElement('div');
  el.className='burst'; el.textContent='⭐';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function renderTokenBoard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (localStorage.getItem('tokenMode') === 'session') { el.innerHTML = ''; return; }
  const left = TOKENS_NEEDED - tokens;
  el.innerHTML = `<div class="token-board">
    <div class="token-board-header">
      <span class="token-board-label">TOKEN BOARD</span>
      <span class="token-board-msg">${tokens>=TOKENS_NEEDED?'🎬 Video time!':left+' more for your video!'}</span>
    </div>
    <div class="token-circles">
      ${Array.from({length:TOKENS_NEEDED},(_,i)=>
        `<div class="token-circle ${i<tokens?'filled':'empty'}">${i<tokens?'⭐':''}</div>`).join('')}
    </div>
  </div>`;
}

function toggleTestMode() {
  isTestMode = !isTestMode;
  document.getElementById('test-toggle').classList.toggle('active', isTestMode);
  document.getElementById('test-banner').style.display = isTestMode ? 'block' : 'none';
}

function logAnswer(isCorrect, chosenLabel, mode, question) {
  try {
    const now = new Date();
    const responseTimeSec = questionStartTime ? Math.round((Date.now()-questionStartTime)/1000) : null;
    fetch(LOG_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        appSource:"shapes",
        date: now.toLocaleDateString("en-US"),
        time: now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
        mode, question, answerGiven: chosenLabel,
        correct: isCorrect, responseTimeSec,
        tokensEarned: tokens, sessionId, isTest: isTestMode
      })
    }).catch(()=>{});
  } catch(e){}
}

// ---- Init ----
renderTokenBoard('welcome-token-board');
if (localStorage.getItem('launchDirect') === '1') {
  localStorage.removeItem('launchDirect');
  startRound();
}
</script>
</body>
