<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Story Time">
<title>Story Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #FFF8F0; font-family: 'Nunito', sans-serif; overflow-x: hidden; }
  body { padding-bottom: env(safe-area-inset-bottom); }
  #app { max-width: 780px; margin: 0 auto; padding: 24px 20px 60px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .logo { font-size: 24px; font-weight: 900; color: #5B8DEF; }
  .token-pill { display: flex; align-items: center; gap: 8px; background: #FFF3CD; padding: 8px 18px; border-radius: 40px; border: 2px solid #FFD166; }
  .token-pill strong { font-size: 17px; color: #7A5C00; }
  .token-board { background: white; border-radius: 24px; border: 3px solid #E8EEF8; padding: 18px 22px; margin-bottom: 20px; }
  .token-board-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .token-board-label { font-size: 16px; font-weight: 800; color: #6B7280; }
  .token-board-msg { font-size: 16px; font-weight: 800; color: #5B8DEF; }
  .token-circles { display: flex; gap: 14px; justify-content: center; }
  .token-circle { width: 62px; height: 62px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: all 0.35s; }
  .token-circle.empty { background: #F1EFE8; border: 4px solid #D3D1C7; }
  .token-circle.filled { background: #FFD166; border: 4px solid #F5A623; box-shadow: 0 4px 12px rgba(245,166,35,0.45); transform: scale(1.08); }
  .card { background: white; border-radius: 24px; border: 3px solid #E8EEF8; padding: 28px; margin-bottom: 20px; }
  .big-btn { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; padding: 20px 52px; border-radius: 60px; border: none; cursor: pointer; min-height: 70px; touch-action: manipulation; color: white; }
  .big-btn.blue { background: #5B8DEF; box-shadow: 0 6px 0 #3a6abf; }
  .big-btn.green { background: #06D6A0; box-shadow: 0 6px 0 #04a07a; }
  .big-btn.purple { background: #7B5EA7; box-shadow: 0 5px 0 #5a4180; }
  .full-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .choice-btn { border-radius: 20px; padding: 20px 14px; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; min-height: 110px; touch-action: manipulation; border: 3px solid #DDE3F0; background: white; color: #2D2D2D; }
  .choice-btn .emoji { font-size: 44px; }
  .choice-btn.correct { background: #ECFDF5; border-color: #06D6A0; color: #065F46; }
  .choice-btn.wrong { background: #FFF1F2; border-color: #EF476F; color: #9F1239; }
  .choice-btn:disabled { cursor: default; }
  .feedback { border-radius: 20px; padding: 18px 20px; font-size: 20px; font-weight: 800; text-align: center; margin-top: 16px; display: none; }
  .feedback.correct { background: #ECFDF5; color: #065F46; }
  .feedback.wrong { background: #FFF1F2; color: #9F1239; }
  .next-btn { width: 100%; margin-top: 16px; background: #5B8DEF; color: white; font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; padding: 18px; border-radius: 60px; border: none; cursor: pointer; box-shadow: 0 5px 0 #3a6abf; min-height: 64px; touch-action: manipulation; display: none; }
  .type-badge { display: inline-block; font-size: 15px; font-weight: 800; padding: 6px 18px; border-radius: 24px; margin-bottom: 14px; }
  .badge-WHO { background: #EEF2FF; color: #4338CA; }
  .badge-WHAT { background: #FEF3C7; color: #92400E; }
  .badge-WHEN { background: #ECFDF5; color: #065F46; }
  .badge-WHERE { background: #FFF1F2; color: #9F1239; }
  .badge-HOW { background: #F5F3FF; color: #5B21B6; }
  .q-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .q-dot { width: 16px; height: 16px; border-radius: 50%; background: #DDE3F0; transition: background 0.3s; }
  .q-dot.done { background: #06D6A0; }
  .q-dot.current { background: #5B8DEF; }
  .story-text { font-size: 21px; line-height: 1.9; color: #2D2D2D; background: #F7F9FF; border-radius: 16px; padding: 20px 24px; }
  .story-text b { color: #5B8DEF; }
  .progress-bar-bg { width: 100%; max-width: 340px; margin: 0 auto 24px; height: 18px; background: #DDE3F0; border-radius: 9px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #06D6A0; border-radius: 9px; transition: width 1s ease-out; }
  .screen { display: none; }
  .screen.active { display: block; }
  .bounce { animation: bounce 2s infinite; display: inline-block; }
  .burst { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; font-size: 120px; z-index: 9999; animation: burst 0.8s ease-out forwards; }
  .stories-progress { font-size: 15px; color: #9CA3AF; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .all-done-banner { background: #EEF2FF; border-radius: 16px; padding: 14px 18px; margin-bottom: 20px; font-size: 18px; font-weight: 800; color: #4338CA; text-align: center; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes burst { 0%{opacity:1;transform:scale(0.5)} 60%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1.8)} }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="logo">📚 Story Time</div>
    <div class="token-pill"><span style="font-size:20px">⭐</span><strong id="token-count">0/5</strong></div>
  </div>

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active" style="text-align:center;padding-top:12px;">
    <div class="bounce" style="font-size:96px;margin-bottom:16px;">📖</div>
    <div style="font-size:36px;font-weight:900;color:#5B8DEF;margin-bottom:8px;">Hi Michael!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:6px;">Read stories. Earn tokens. Watch a video!</div>
    <div style="font-size:17px;color:#9CA3AF;font-weight:600;margin-bottom:28px;">Answer 1 question = 1 ⭐ · Fill 5 stars = 🎬 video!</div>
    <div id="welcome-token-board"></div>
    <div id="all-done-banner" class="all-done-banner" style="display:none;">🎉 You read ALL 52 stories! Shuffling them again!</div>
    <div id="stories-progress" class="stories-progress"></div>
    <button class="big-btn blue" onclick="startStory()">Let's Go! 🚀</button>
  </div>

  <!-- STORY -->
  <div id="screen-story" class="screen">
    <div id="story-token-board"></div>
    <div class="card">
      <div id="story-emoji" style="font-size:72px;text-align:center;margin-bottom:12px;"></div>
      <div id="story-title" style="font-size:26px;font-weight:900;color:#5B8DEF;text-align:center;margin-bottom:16px;"></div>
      <div id="story-text" class="story-text"></div>
    </div>
    <button class="big-btn purple full-btn" onclick="goToQuestions()">🎯 Ready for Questions!</button>
  </div>

  <!-- QUESTIONS -->
  <div id="screen-questions" class="screen">
    <div id="q-token-board"></div>
    <div class="q-dots" id="q-dots"></div>
    <div class="card">
      <div id="q-badge" class="type-badge"></div>
      <div id="q-text" style="font-size:24px;font-weight:800;color:#2D2D2D;margin-bottom:20px;line-height:1.3;"></div>
      <div class="choice-grid" id="choice-grid"></div>
      <div id="feedback" class="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen" style="text-align:center;padding-top:12px;">
    <div id="result-emoji" style="font-size:100px;margin-bottom:14px;animation:bounce 1s ease-out;display:inline-block;"></div>
    <div id="result-title" style="font-size:32px;font-weight:900;margin-bottom:8px;"></div>
    <div id="result-score" style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:24px;"></div>
    <div class="progress-bar-bg"><div id="result-bar" class="progress-bar-fill" style="width:0%;"></div></div>
    <div id="result-token-board"></div>
    <button class="big-btn green" onclick="startStory()">Read Another Story! 📚</button>
  </div>

  <!-- REWARD -->
  <div id="screen-reward" class="screen" style="text-align:center;padding-top:10px;">
    <div style="font-size:100px;margin-bottom:10px;">🎬</div>
    <div style="font-size:36px;font-weight:900;color:#5B8DEF;margin-bottom:8px;">You earned a video!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:28px;">Awesome work, Michael! 🎉</div>
    <div id="reward-stars" style="display:flex;gap:14px;justify-content:center;margin-bottom:28px;"></div>
    <div style="background:#F0F5FF;border-radius:22px;padding:24px 28px;margin-bottom:28px;">
      <div style="font-size:16px;color:#6B7280;font-weight:600;margin-bottom:6px;">Your video reward:</div>
      <div id="yt-label" style="font-size:20px;font-weight:800;color:#2D2D2D;margin-bottom:18px;"></div>
      <button onclick="openYouTube()" style="width:100%;background:#FF0000;color:white;font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;padding:18px;border-radius:60px;border:none;cursor:pointer;box-shadow:0 5px 0 #b00000;min-height:70px;touch-action:manipulation;">▶ Watch on YouTube!</button>
      <div style="font-size:13px;color:#9CA3AF;margin-top:10px;" id="yt-hint"></div>
    </div>
    <button class="big-btn blue" style="width:100%;" onclick="resetTokens();showScreen('welcome')">Keep Reading! 📚</button>
  </div>
</div>

<script>
const STORIES = [
  {title:"Leo Goes to the Park",e:"🦁",story:"<b>Leo</b> is a little lion who loves the park. He went to the park on a sunny Monday morning. He played on the swings and ran through the grass. When he got tired, he sat under a big tree. He felt happy because he made a new friend named Zara.",questions:[{type:"WHO",q:"Who is the story about?",choices:[{e:"🦁",l:"Leo the lion",c:true},{e:"🐻",l:"A bear",c:false},{e:"🐸",l:"A frog",c:false},{e:"🦊",l:"A fox",c:false}]},{type:"WHAT",q:"What did Leo do at the park?",choices:[{e:"🛝",l:"Played on swings",c:true},{e:"🏊",l:"Went swimming",c:false},{e:"🎨",l:"Drew pictures",c:false},{e:"🍕",l:"Ate pizza",c:false}]},{type:"WHEN",q:"When did Leo go to the park?",choices:[{e:"🌅",l:"Monday morning",c:true},{e:"🌙",l:"At night",c:false},{e:"🌧️",l:"A rainy day",c:false},{e:"❄️",l:"In the winter",c:false}]},{type:"WHERE",q:"Where did Leo sit when tired?",choices:[{e:"🌳",l:"Under a tree",c:true},{e:"🏠",l:"In a house",c:false},{e:"🪑",l:"On a bench",c:false},{e:"🏕️",l:"In a tent",c:false}]},{type:"HOW",q:"How did Leo feel at the end?",choices:[{e:"😊",l:"Happy",c:true},{e:"😢",l:"Sad",c:false},{e:"😴",l:"Sleepy",c:false},{e:"😠",l:"Angry",c:false}]}]},
  {title:"Mia Bakes Cookies",e:"🍪",story:"<b>Mia</b> is a girl who loves to bake. One Saturday afternoon, she baked chocolate chip cookies in her kitchen. She mixed the dough, added lots of chips, and put them in the oven. The cookies smelled amazing! She shared them with her little brother Max.",questions:[{type:"WHO",q:"Who baked the cookies?",choices:[{e:"👧",l:"Mia",c:true},{e:"👦",l:"Max",c:false},{e:"👩",l:"Her mom",c:false},{e:"👴",l:"Her grandpa",c:false}]},{type:"WHAT",q:"What did Mia bake?",choices:[{e:"🍪",l:"Cookies",c:true},{e:"🎂",l:"A cake",c:false},{e:"🥧",l:"A pie",c:false},{e:"🧁",l:"Cupcakes",c:false}]},{type:"WHEN",q:"When did Mia bake?",choices:[{e:"🌤️",l:"Saturday afternoon",c:true},{e:"🌙",l:"Friday night",c:false},{e:"🌅",l:"Sunday morning",c:false},{e:"🏫",l:"After school",c:false}]},{type:"WHERE",q:"Where did Mia bake?",choices:[{e:"🍳",l:"In the kitchen",c:true},{e:"🏫",l:"At school",c:false},{e:"🌳",l:"Outside",c:false},{e:"🛒",l:"At a store",c:false}]},{type:"HOW",q:"How did the cookies smell?",choices:[{e:"😍",l:"Amazing",c:true},{e:"🤢",l:"Bad",c:false},{e:"🌸",l:"Like flowers",c:false},{e:"❓",l:"No smell",c:false}]}]},
  {title:"Rex Finds a Bone",e:"🐕",story:"<b>Rex</b> is a funny brown dog. He was digging in the backyard on a warm afternoon. He found a big shiny bone buried deep in the dirt! Rex wagged his tail and jumped up and down. He buried the bone again to save it for later.",questions:[{type:"WHO",q:"Who is Rex?",choices:[{e:"🐕",l:"A brown dog",c:true},{e:"🐈",l:"A cat",c:false},{e:"🐇",l:"A rabbit",c:false},{e:"🦔",l:"A hedgehog",c:false}]},{type:"WHAT",q:"What did Rex find?",choices:[{e:"🦴",l:"A big bone",c:true},{e:"🎾",l:"A tennis ball",c:false},{e:"💎",l:"A diamond",c:false},{e:"🪙",l:"A coin",c:false}]},{type:"WHEN",q:"When was Rex digging?",choices:[{e:"☀️",l:"Warm afternoon",c:true},{e:"🌙",l:"At night",c:false},{e:"🌧️",l:"In the rain",c:false},{e:"❄️",l:"In the snow",c:false}]},{type:"WHERE",q:"Where was Rex digging?",choices:[{e:"🌿",l:"The backyard",c:true},{e:"🏖️",l:"The beach",c:false},{e:"🏕️",l:"The woods",c:false},{e:"🏫",l:"At school",c:false}]},{type:"HOW",q:"How did Rex show he was happy?",choices:[{e:"🐕",l:"Wagged his tail",c:true},{e:"😴",l:"Fell asleep",c:false},{e:"🏃",l:"Ran away",c:false},{e:"🍖",l:"Ate the bone",c:false}]}]},
  {title:"Sam Sees a Rainbow",e:"🌈",story:"<b>Sam</b> was looking out the window after a big rainstorm. He saw a huge colorful rainbow in the sky! The rainbow had red, orange, yellow, green, blue, and purple colors. Sam ran outside to see it better. He pointed at it and yelled, 'Wow, so beautiful!'",questions:[{type:"WHO",q:"Who saw the rainbow?",choices:[{e:"👦",l:"Sam",c:true},{e:"👧",l:"His sister",c:false},{e:"👩",l:"His mom",c:false},{e:"👴",l:"His grandpa",c:false}]},{type:"WHAT",q:"What did Sam see in the sky?",choices:[{e:"🌈",l:"A rainbow",c:true},{e:"⭐",l:"A shooting star",c:false},{e:"🌤️",l:"A cloud",c:false},{e:"🦅",l:"A big bird",c:false}]},{type:"WHEN",q:"When did Sam see the rainbow?",choices:[{e:"🌧️",l:"After the rainstorm",c:true},{e:"🌙",l:"At nighttime",c:false},{e:"❄️",l:"During winter",c:false},{e:"🌅",l:"At sunrise",c:false}]},{type:"WHERE",q:"Where was Sam when he first saw it?",choices:[{e:"🪟",l:"At the window",c:true},{e:"🏫",l:"At school",c:false},{e:"🛒",l:"At the store",c:false},{e:"🌳",l:"In the park",c:false}]},{type:"HOW",q:"How did Sam react?",choices:[{e:"😮",l:"Yelled 'Wow!'",c:true},{e:"😴",l:"Fell asleep",c:false},{e:"😢",l:"Started crying",c:false},{e:"📺",l:"Watched TV",c:false}]}]},
  {title:"Zara Visits the Zoo",e:"🦒",story:"<b>Zara</b> went to the zoo with her dad on a Friday. She saw tall giraffes, roaring lions, and funny monkeys. Her favorite animal was the elephant because it sprayed water from its trunk! They ate ice cream before going home. Zara said it was the best day ever.",questions:[{type:"WHO",q:"Who went to the zoo?",choices:[{e:"👧",l:"Zara",c:true},{e:"👦",l:"Her brother",c:false},{e:"👩",l:"Her mom",c:false},{e:"👨‍🏫",l:"Her teacher",c:false}]},{type:"WHAT",q:"What was Zara's favorite animal?",choices:[{e:"🐘",l:"The elephant",c:true},{e:"🦒",l:"The giraffe",c:false},{e:"🦁",l:"The lion",c:false},{e:"🐒",l:"The monkey",c:false}]},{type:"WHEN",q:"When did Zara visit?",choices:[{e:"📅",l:"On a Friday",c:true},{e:"📅",l:"On Monday",c:false},{e:"📅",l:"On Sunday",c:false},{e:"📅",l:"On Wednesday",c:false}]},{type:"WHERE",q:"Where did they eat ice cream?",choices:[{e:"🦒",l:"At the zoo",c:true},{e:"🏠",l:"At home",c:false},{e:"🏫",l:"At school",c:false},{e:"🛒",l:"At the store",c:false}]},{type:"HOW",q:"How did the elephant spray water?",choices:[{e:"🐘",l:"With its trunk",c:true},{e:"💦",l:"With its feet",c:false},{e:"👂",l:"With its ears",c:false},{e:"🦷",l:"With its mouth",c:false}]}]},
  {title:"Pip Flies a Kite",e:"🪁",story:"<b>Pip</b> is a little penguin who wanted to fly a kite. On a windy Wednesday, she went to the hill near her house. She held the kite string tightly and ran as fast as she could. The kite went up, up, up into the blue sky! Pip laughed and danced because she did it all by herself.",questions:[{type:"WHO",q:"Who flew the kite?",choices:[{e:"🐧",l:"Pip the penguin",c:true},{e:"🦆",l:"A duck",c:false},{e:"🦜",l:"A parrot",c:false},{e:"🐦",l:"A sparrow",c:false}]},{type:"WHAT",q:"What did Pip fly?",choices:[{e:"🪁",l:"A kite",c:true},{e:"🛩️",l:"A plane",c:false},{e:"🎈",l:"A balloon",c:false},{e:"🚁",l:"A helicopter",c:false}]},{type:"WHEN",q:"When did Pip fly the kite?",choices:[{e:"💨",l:"Windy Wednesday",c:true},{e:"☀️",l:"Sunny Sunday",c:false},{e:"🌧️",l:"Rainy Tuesday",c:false},{e:"❄️",l:"Snowy Friday",c:false}]},{type:"WHERE",q:"Where did Pip fly her kite?",choices:[{e:"⛰️",l:"On a hill",c:true},{e:"🏖️",l:"At the beach",c:false},{e:"🌳",l:"In the forest",c:false},{e:"🏫",l:"At school",c:false}]},{type:"HOW",q:"How did Pip feel when the kite went up?",choices:[{e:"😂",l:"Laughed and danced",c:true},{e:"😢",l:"She cried",c:false},{e:"😴",l:"Fell asleep",c:false},{e:"😠",l:"Got angry",c:false}]}]},

  {title:"Nina Finds a Puppy",e:"🐶",story:"<b>Nina</b> was walking home from school on a Thursday. She heard a tiny whimper near the bushes. She looked and found a small fluffy puppy sitting all alone! Nina picked it up and carried it home. Her mom said they could keep it, and Nina named it Biscuit.",questions:[{type:"WHO",q:"Who found the puppy?",choices:[{e:"👧",l:"Nina",c:true},{e:"👦",l:"Her brother",c:false},{e:"👩",l:"Her mom",c:false},{e:"👮",l:"A police officer",c:false}]},{type:"WHAT",q:"What did Nina find?",choices:[{e:"🐶",l:"A fluffy puppy",c:true},{e:"🐱",l:"A kitten",c:false},{e:"🐇",l:"A rabbit",c:false},{e:"🐦",l:"A bird",c:false}]},{type:"WHEN",q:"When did Nina find the puppy?",choices:[{e:"🏫",l:"Walking home Thursday",c:true},{e:"🌙",l:"Late at night",c:false},{e:"🌅",l:"Early morning",c:false},{e:"🛒",l:"At the store",c:false}]},{type:"WHERE",q:"Where was the puppy hiding?",choices:[{e:"🌿",l:"Near the bushes",c:true},{e:"🌳",l:"Up a tree",c:false},{e:"🏠",l:"In a house",c:false},{e:"🚗",l:"In a car",c:false}]},{type:"HOW",q:"What did Nina name the puppy?",choices:[{e:"🍪",l:"Biscuit",c:true},{e:"⭐",l:"Star",c:false},{e:"🌈",l:"Rainbow",c:false},{e:"🎾",l:"Buddy",c:false}]}]},

const TOKENS_NEEDED = 5;
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// ---- State ----
let tokens = 0;
let storyOrder = [];   // shuffled indices
let orderPos = 0;      // which story we're on in the order
let currentStoryIdx = 0;
let currentQ = 0;
let correctCount = 0;
let answered = false;
let shuffledChoices = [];
let currentSearch = "";

function buildOrder() {
  storyOrder = shuffle(STORIES.map((_, i) => i));
  orderPos = 0;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function renderTokenBoard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const left = TOKENS_NEEDED - tokens;
  el.innerHTML = `<div class="token-board">
    <div class="token-board-header">
      <span class="token-board-label">TOKEN BOARD</span>
      <span class="token-board-msg">${tokens >= TOKENS_NEEDED ? '🎬 Video time!' : left + ' more for your video!'}</span>
    </div>
    <div class="token-circles">
      ${Array.from({length: TOKENS_NEEDED}, (_, i) =>
        `<div class="token-circle ${i < tokens ? 'filled' : 'empty'}">${i < tokens ? '⭐' : ''}</div>`
      ).join('')}
    </div>
  </div>`;
}

function updateWelcome() {
  document.getElementById('token-count').textContent = tokens + '/' + TOKENS_NEEDED;
  renderTokenBoard('welcome-token-board');
  const remaining = storyOrder.length - orderPos;
  document.getElementById('stories-progress').textContent =
    `📖 ${remaining} of ${STORIES.length} stories left this round`;
}

function showBurst() {
  const el = document.createElement('div');
  el.className = 'burst';
  el.textContent = '⭐';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function giveToken() {
  tokens++;
  document.getElementById('token-count').textContent = tokens + '/' + TOKENS_NEEDED;
  renderTokenBoard('q-token-board');
  if (tokens >= TOKENS_NEEDED) setTimeout(showReward, 1100);
}

function resetTokens() { tokens = 0; }

function startStory() {
  // If we've run through all stories, reshuffle and announce
  if (orderPos >= storyOrder.length) {
    document.getElementById('all-done-banner').style.display = 'block';
    buildOrder();
  } else {
    document.getElementById('all-done-banner').style.display = 'none';
  }

  currentStoryIdx = storyOrder[orderPos];
  orderPos++;

  const story = STORIES[currentStoryIdx];
  // Shuffle choices for each question
  shuffledChoices = story.questions.map(q => shuffle(q.choices));
  correctCount = 0; currentQ = 0; answered = false;

  renderTokenBoard('story-token-board');
  document.getElementById('story-emoji').textContent = story.e;
  document.getElementById('story-title').textContent = story.title;
  document.getElementById('story-text').innerHTML = story.story;
  updateWelcome();
  showScreen('story');
}

function goToQuestions() {
  currentQ = 0; answered = false;
  renderQuestion();
  showScreen('questions');
}

function renderQuestion() {
  const story = STORIES[currentStoryIdx];
  const q = story.questions[currentQ];
  const choices = shuffledChoices[currentQ];

  renderTokenBoard('q-token-board');

  // Dots
  document.getElementById('q-dots').innerHTML = story.questions.map((_, i) =>
    `<div class="q-dot ${i < currentQ ? 'done' : i === currentQ ? 'current' : ''}"></div>`
  ).join('');

  // Badge
  const badge = document.getElementById('q-badge');
  badge.textContent = q.type;
  badge.className = 'type-badge badge-' + q.type;

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  questionStartTime = Date.now();

  document.getElementById('choice-grid').innerHTML = choices.map((c, i) =>
    `<button class="choice-btn" id="ch-${i}" onclick="handleAnswer(${c.c}, ${i})">
      <span class="emoji">${c.e}</span><span>${c.l}</span>
    </button>`
  ).join('');
}

function handleAnswer(isCorrect, idx) {
  if (answered) return;
  answered = true;
  giveToken();

  const choices = shuffledChoices[currentQ];
  const chosenLabel = choices[idx].l;
  logAnswer(isCorrect, chosenLabel);
  choices.forEach((c, i) => {
    const btn = document.getElementById('ch-' + i);
    btn.disabled = true;
    if (i === idx) btn.classList.add(c.c ? 'correct' : 'wrong');
    else if (c.c) btn.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  const nb = document.getElementById('next-btn');

  if (isCorrect) {
    correctCount++;
    fb.className = 'feedback correct';
    fb.textContent = '⭐ Amazing! That\'s right!';
    showBurst();
  } else {
    const correct = choices.find(c => c.c);
    fb.className = 'feedback wrong';
    fb.textContent = 'Good try! The answer is: ' + correct.e + ' ' + correct.l;
  }
  fb.style.display = 'block';

  if (tokens < TOKENS_NEEDED) {
    const totalQ = STORIES[currentStoryIdx].questions.length;
    nb.textContent = currentQ < totalQ - 1 ? 'Next ➡️' : 'See My Score! 🏆';
    nb.style.display = 'block';
  }
}

function nextQuestion() {
  const totalQ = STORIES[currentStoryIdx].questions.length;
  currentQ++;
  answered = false;
  if (currentQ < totalQ) renderQuestion();
  else showResult();
}

function showResult() {
  const totalQ = STORIES[currentStoryIdx].questions.length;
  const pct = Math.round((correctCount / totalQ) * 100);
  document.getElementById('result-emoji').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '🌟' : '💪';
  document.getElementById('result-title').textContent =
    pct >= 80 ? 'Amazing job, Michael!' : pct >= 60 ? 'Great work, Michael!' : 'Keep going, Michael!';
  document.getElementById('result-score').textContent =
    'You got ' + correctCount + ' out of ' + totalQ + ' right!';
  renderTokenBoard('result-token-board');
  showScreen('result');
  setTimeout(() => { document.getElementById('result-bar').style.width = pct + '%'; }, 100);
}

function showReward() {
  const searches = ["Bluey full episodes kids","Mario Bros cartoon for kids","Minecraft funny animation kids",
    "Pokemon cartoon episodes kids","SpongeBob funny moments","cartoon funny animals kids",
    "Paw Patrol episodes","funny video game cartoons kids"];
  currentSearch = searches[Math.floor(Math.random() * searches.length)];
  document.getElementById('yt-label').textContent = '"' + currentSearch + '"';
  document.getElementById('yt-hint').textContent = 'Search "' + currentSearch + '" on YouTube if button doesn\'t open';
  document.getElementById('reward-stars').innerHTML = Array.from({length: TOKENS_NEEDED}).map(() =>
    `<div style="width:64px;height:64px;border-radius:50%;background:#FFD166;border:4px solid #F5A623;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 12px rgba(245,166,35,0.5);">⭐</div>`
  ).join('');
  showScreen('reward');
}

function openYouTube() {
  window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(currentSearch), '_blank');
}

// ---- MySQL Logging ----
const SHEET_URL = "https://jaloza.com/michael/iep/log.php";
const sessionId = "s_" + Date.now();
let questionStartTime = null;

function logAnswer(isCorrect, chosenLabel) {
  const now = new Date();
  const story = STORIES[currentStoryIdx];
  const q = story.questions[currentQ];
  const responseTimeSec = questionStartTime ? Math.round((Date.now() - questionStartTime) / 1000) : null;

  const payload = {
    appSource: "story",
    date: now.toLocaleDateString("en-US"),
    time: now.toLocaleTimeString("en-US", {hour: "2-digit", minute: "2-digit"}),
    story: story.title,
    questionNum: currentQ + 1,
    questionType: q.type,
    question: q.q,
    answerGiven: chosenLabel,
    correct: isCorrect,
    responseTimeSec: responseTimeSec,
    tokensEarned: tokens,
    sessionId: sessionId
  };

  fetch(SHEET_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ---- Init ----
buildOrder();
updateWelcome();
</script>
