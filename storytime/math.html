// ---- Shuffle ----
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// ---- State ----
let tokens = 0;
let currentQ = 0;
let correctCount = 0;
let answered = false;
let roundQuestions = [];   // 5 questions per round, shuffled
let questionStartTime = null;
let currentSearch = "";
let roundNum = 0;

// Build a balanced round: ~2 LENGTH, ~2 WIDTH, ~1 CAPACITY (or fully random from all 45)
function buildRound() {
  const shuffled = shuffle(QUESTIONS);
  // Pick 5 spread across categories
  const length   = shuffled.filter(q => q.cat === "LENGTH").slice(0, 2);
  const width    = shuffled.filter(q => q.cat === "WIDTH").slice(0, 2);
  const capacity = shuffled.filter(q => q.cat === "CAPACITY").slice(0, 1);
  return shuffle([...length, ...width, ...capacity]);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function renderTokenBoard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const left = TOKENS_NEEDED - tokens;
  el.innerHTML = `<div class="token-board">
    <div class="token-board-header">
      <span class="token-board-label">TOKEN BOARD</span>
      <span class="token-board-msg">${tokens >= TOKENS_NEEDED ? '🎬 Video time!' : left + ' more for your video!'}</span>
    </div>
    <div class="token-circles">
      ${Array.from({length: TOKENS_NEEDED}, (_, i) =>
        `<div class="token-circle ${i < tokens ? 'filled' : 'empty'}">${i < tokens ? '⭐' : ''}</div>`
      ).join('')}
    </div>
  </div>`;
}

function updateWelcome() {
  document.getElementById('token-count').textContent = tokens + '/' + TOKENS_NEEDED;
  renderTokenBoard('welcome-token-board');
  document.getElementById('round-counter').textContent =
    roundNum > 0 ? `Round ${roundNum} complete · ${tokens} ⭐ earned so far` : '5 questions per round · 3 categories';
}

function showBurst() {
  const el = document.createElement('div');
  el.className = 'burst';
  el.textContent = '⭐';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function giveToken() {
  tokens++;
  document.getElementById('token-count').textContent = tokens + '/' + TOKENS_NEEDED;
  renderTokenBoard('q-token-board');
  if (tokens >= TOKENS_NEEDED) setTimeout(showReward, 1100);
}

function resetTokens() { tokens = 0; }

function startRound() {
  roundNum++;
  roundQuestions = buildRound();
  currentQ = 0; correctCount = 0; answered = false;
  renderQuestion();
  showScreen('question');
}

function renderQuestion() {
  const q = roundQuestions[currentQ];
  renderTokenBoard('q-token-board');

  // Dots
  document.getElementById('q-dots').innerHTML = roundQuestions.map((_, i) =>
    `<div class="q-dot ${i < currentQ ? 'done' : i === currentQ ? 'current' : ''}"></div>`
  ).join('');

  // Badge
  const badge = document.getElementById('category-badge');
  badge.textContent = q.cat === 'LENGTH' ? '📏 LENGTH' : q.cat === 'WIDTH' ? '↔️ WIDTH' : '🥤 CAPACITY';
  badge.className = 'category-badge badge-' + q.cat;

  document.getElementById('question-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  // Randomly swap left/right so correct answer isn't always on same side
  const flipped = Math.random() > 0.5;
  const left  = flipped ? q.b : q.a;
  const right = flipped ? q.a : q.b;
  const leftCorrect  = flipped ? (q.correct === 1) : (q.correct === 0);
  const rightCorrect = flipped ? (q.correct === 0) : (q.correct === 1);

  document.getElementById('choice-row').innerHTML = `
    <button class="choice-btn" id="btn-left"  onclick="handleAnswer(${leftCorrect},  'left',  '${left.l}')">
      <span class="item-emoji">${left.e}</span>
      <span class="item-label">${left.l}</span>
    </button>
    <button class="choice-btn" id="btn-right" onclick="handleAnswer(${rightCorrect}, 'right', '${right.l}')">
      <span class="item-emoji">${right.e}</span>
      <span class="item-label">${right.l}</span>
    </button>`;

  questionStartTime = Date.now();
}

function handleAnswer(isCorrect, side, chosenLabel) {
  if (answered) return;
  answered = true;
  giveToken();

  const q = roundQuestions[currentQ];
  const responseTimeSec = Math.round((Date.now() - questionStartTime) / 1000);

  // Visual feedback
  const chosen = document.getElementById('btn-' + side);
  const other  = document.getElementById(side === 'left' ? 'btn-right' : 'btn-left');
  chosen.disabled = true;
  other.disabled  = true;
  chosen.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) other.classList.add('correct');

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    correctCount++;
    fb.className = 'feedback correct';
    fb.textContent = '⭐ That\'s right!';
    showBurst();
  } else {
    fb.className = 'feedback wrong';
    fb.textContent = 'Good try! Look at the green one — that\'s the answer!';
  }
  fb.style.display = 'block';

  // Log to MySQL
  logAnswer(q, chosenLabel, isCorrect, responseTimeSec);

  if (tokens < TOKENS_NEEDED) {
    const nb = document.getElementById('next-btn');
    nb.textContent = currentQ < roundQuestions.length - 1 ? 'Next ➡️' : 'See My Score! 🏆';
    nb.style.display = 'block';
  }
}

function nextQuestion() {
  currentQ++;
  answered = false;
  if (currentQ < roundQuestions.length) renderQuestion();
  else showResult();
}

function showResult() {
  const total = roundQuestions.length;
  const pct = Math.round((correctCount / total) * 100);
  document.getElementById('result-emoji').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '🌟' : '💪';
  document.getElementById('result-title').textContent =
    pct >= 80 ? 'Amazing job, Michael!' : pct >= 60 ? 'Great work, Michael!' : 'Keep going, Michael!';
  document.getElementById('result-score').textContent =
    'You got ' + correctCount + ' out of ' + total + ' right!';
  renderTokenBoard('result-token-board');
  updateWelcome();
  showScreen('result');
  setTimeout(() => { document.getElementById('result-bar').style.width = pct + '%'; }, 100);
}

function showReward() {
  const searches = VIDEO_SEARCHES;
  currentSearch = searches[Math.floor(Math.random() * searches.length)];
  document.getElementById('yt-label').textContent = '"' + currentSearch + '"';
  document.getElementById('yt-hint').textContent = 'Search "' + currentSearch + '" on YouTube if button doesn\'t open';
  document.getElementById('reward-stars').innerHTML = Array.from({length: TOKENS_NEEDED}).map(() =>
    `<div style="width:64px;height:64px;border-radius:50%;background:#FFD166;border:4px solid #F5A623;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 12px rgba(245,166,35,0.5);">⭐</div>`
  ).join('');
  showScreen('reward');
}

function openYouTube() {
  window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(currentSearch), '_blank');
}

function logAnswer(q, chosenLabel, isCorrect, responseTimeSec) {
  const now = new Date();
  const payload = {
    appSource: "math",
    date: now.toLocaleDateString("en-US"),
    time: now.toLocaleTimeString("en-US", {hour: "2-digit", minute: "2-digit"}),
    category: q.cat,
    question: q.q,
    correctAnswer: q.correct === 0 ? q.a.l : q.b.l,
    answerGiven: chosenLabel,
    correct: isCorrect,
    responseTimeSec: responseTimeSec,
    tokensEarned: tokens,
    sessionId: sessionId,
    isTest: isTestMode
  };

  fetch(LOG_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ---- Init ----
updateWelcome();
</script>
</body>
</html>
