<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Math Compare — Michael</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Nunito',sans-serif;background:#FFF8F0;min-height:100vh;display:flex;flex-direction:column;}

  #topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#FF9F1C;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  #topbar a{color:#fff;text-decoration:none;font-size:18px;font-weight:800;padding:6px 12px;background:rgba(255,255,255,.2);border-radius:10px;}
  #topbar .title{color:#fff;font-size:20px;font-weight:900;letter-spacing:.5px;}
  #test-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;}
  #test-btn.active{background:#fff;color:#FF9F1C;}

  #token-board{display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;border-bottom:2px solid #FFE0A0;flex-wrap:wrap;}
  #token-board .token-label{font-size:15px;font-weight:800;color:#FF9F1C;margin-right:4px;}
  .token{width:38px;height:38px;border-radius:50%;border:3px solid #FF9F1C;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;background:#FFF8F0;}
  .token.earned{background:#FF9F1C;border-color:#FF9F1C;}
  #round-info{margin-left:auto;font-size:14px;font-weight:700;color:#888;}

  #main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:16px;max-width:700px;width:100%;margin:0 auto;}

  #screen-welcome{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding-top:20px;}
  .welcome-title{font-size:36px;font-weight:900;color:#FF9F1C;text-align:center;}
  .welcome-sub{font-size:20px;font-weight:700;color:#555;text-align:center;}
  .big-btn{background:#FF9F1C;color:#fff;border:none;border-radius:20px;padding:18px 48px;font-size:24px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(255,159,28,.4);transition:transform .1s,box-shadow .1s;}
  .big-btn:active{transform:scale(.96);box-shadow:0 2px 6px rgba(255,159,28,.3);}
  .big-btn.green{background:#43A047;}
  .big-btn.blue{background:#1976D2;}
  .big-btn.red{background:#FF0000;}

  #screen-question{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
  .progress-dots{display:flex;gap:12px;}
  .dot{width:20px;height:20px;border-radius:50%;background:#FFE0A0;border:2px solid #FF9F1C;transition:background .3s;}
  .dot.done{background:#FF9F1C;}

  .cat-badge{padding:6px 20px;border-radius:20px;font-size:15px;font-weight:800;color:#fff;letter-spacing:1px;}
  .cat-badge.LENGTH{background:#1976D2;}
  .cat-badge.WIDTH{background:#7B1FA2;}
  .cat-badge.CAPACITY{background:#2E7D32;}

  .q-text{font-size:26px;font-weight:900;color:#333;text-align:center;padding:0 8px;}

  .compare-card{width:100%;background:#fff;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;border:3px solid #FFE0A0;}
  .card-halves{display:flex;width:100%;}
  .card-half{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px 10px 20px;cursor:pointer;transition:background .2s;user-select:none;}
  .card-half:first-child{border-right:3px solid #FFE0A0;}
  .card-half:active{opacity:.85;}
  .card-half.correct-flash{background:#E8F5E9;}
  .card-half.wrong-flash{background:#FFEBEE;}
  .card-half.highlight-correct{background:#C8E6C9 !important;outline:4px solid #43A047;}
  .card-half svg{width:100%;max-width:200px;}
  .item-label{font-size:18px;font-weight:800;color:#444;margin-top:10px;text-align:center;}

  #feedback-row{min-height:56px;display:flex;align-items:center;justify-content:center;}
  .feedback-msg{font-size:20px;font-weight:800;padding:12px 24px;border-radius:16px;text-align:center;}
  .feedback-msg.correct{background:#E8F5E9;color:#2E7D32;}
  .feedback-msg.wrong{background:#FFEBEE;color:#C62828;}

  #screen-result{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding-top:20px;}
  .result-title{font-size:32px;font-weight:900;color:#FF9F1C;text-align:center;}
  .score-text{font-size:22px;font-weight:700;color:#555;}
  .progress-bar-wrap{width:100%;max-width:400px;background:#FFE0A0;border-radius:20px;overflow:hidden;height:28px;}
  .progress-bar-fill{height:100%;background:#FF9F1C;border-radius:20px;transition:width .6s ease;}

  #screen-reward{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding-top:20px;}
  .reward-title{font-size:36px;font-weight:900;color:#FF9F1C;text-align:center;}
  .stars-row{font-size:52px;letter-spacing:8px;}
  .reward-sub{font-size:20px;font-weight:700;color:#555;text-align:center;}
</style>
</head>
<body>

<div id="topbar">
  <a href="https://jaloza.com/michael/">&#8592; Home</a>
  <span class="title">Math Compare</span>
  <button id="test-btn" onclick="toggleTest()">&#129514;</button>
</div>

<div id="token-board">

  <div class="token" id="tok1"></div>

  <span id="round-info">Round 1</span>
</div>

<div id="main">

  <div id="screen-welcome">
    <div class="welcome-title">Hi Michael!</div>
    <div class="welcome-sub">Let's compare sizes!<br/>Answer 5 questions to earn a token.</div>
    <div class="welcome-sub" style="font-size:16px;color:#aaa;">5 tokens = YouTube video!</div>
    <button class="big-btn" onclick="startRound()">Let's Go!</button>
  </div>

  <div id="screen-question" style="display:none;">
    <div class="progress-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>
    <span class="cat-badge" id="cat-badge">LENGTH</span>
    <div class="q-text" id="q-text">Which one is LONGER?</div>
    <div class="compare-card">
      <div class="card-halves">
        <div class="card-half" id="half-left" onclick="handleAnswer('left')">
          <svg id="svg-left" viewBox="0 0 160 90" width="100%"></svg>
          <div class="item-label" id="label-left">Item A</div>
        </div>
        <div class="card-half" id="half-right" onclick="handleAnswer('right')">
          <svg id="svg-right" viewBox="0 0 160 90" width="100%"></svg>
          <div class="item-label" id="label-right">Item B</div>
        </div>
      </div>
    </div>
    <div id="feedback-row"></div>
    <button class="big-btn" id="next-btn" style="display:none;" onclick="nextQuestion()">Next &#8594;</button>
  </div>

  <div id="screen-result" style="display:none;">
    <div class="result-title" id="result-title">Great job!</div>
    <div class="score-text" id="score-text">You got 4 out of 5!</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="score-bar" style="width:0%"></div></div>
    <div class="score-text" id="token-earned-msg"></div>
    <button class="big-btn" onclick="startRound()">Play Again!</button>
  </div>

  <div id="screen-reward" style="display:none;">
    <div class="reward-title">You earned a video!</div>
    <div class="stars-row">&#11088;&#11088;&#11088;&#11088;&#11088;</div>
    <div class="reward-sub">Amazing work, Michael!<br/>You filled up your token board!</div>
    <a href="https://www.youtube.com/results?search_query=kids+cartoons" target="_blank" style="text-decoration:none;">
      <button class="big-btn red">&#9654; Watch on YouTube</button>
    </a>
    <button class="big-btn green" onclick="resetTokens();startRound();">Keep Playing!</button>
  </div>

</div>

// ── UTILITIES ────────────────────────────────────────────────────────────────
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function getByCategory(cat){return QUESTIONS.filter(function(q){return q.cat===cat;});}
function sampleRound(){
  var len=shuffle(getByCategory("LENGTH")).slice(0,2);
  var wid=shuffle(getByCategory("WIDTH")).slice(0,2);
  var cap=shuffle(getByCategory("CAPACITY")).slice(0,1);
  return shuffle(len.concat(wid,cap));
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function showScreen(id){
  ['screen-welcome','screen-question','screen-result','screen-reward'].forEach(function(s){
    document.getElementById(s).style.display='none';
  });
  document.getElementById(id).style.display='flex';
}

// ── TOKEN BOARD ──────────────────────────────────────────────────────────────
function updateTokenBoard(){
  for(var i=1;i<=5;i++){
    var el=document.getElementById('tok'+i);
    el.textContent=i<=tokens?'\u2B50':'';
    el.classList.toggle('earned',i<=tokens);
  }
  document.getElementById('round-info').textContent='Round '+roundNum;
}
function resetTokens(){tokens=0;updateTokenBoard();}

// ── ROUND ─────────────────────────────────────────────────────────────────────
function startRound(){
  roundQuestions=sampleRound();
  qIndex=0;
  roundScore=0;
  showScreen('screen-question');
  updateTokenBoard();
  showQuestion();
}

function showQuestion(){
  answered=false;
  var q=roundQuestions[qIndex];

  for(var i=0;i<5;i++){document.getElementById('d'+i).classList.toggle('done',i<qIndex);}

  var badge=document.getElementById('cat-badge');
  badge.textContent=q.cat;
  badge.className='cat-badge '+q.cat;
  document.getElementById('q-text').textContent=q.q;

  var correctLeft=(Math.random()<0.5);
  correctSide=correctLeft?'left':'right';

  document.getElementById('svg-left').innerHTML=correctLeft?q.aSvg:q.bSvg;
  document.getElementById('svg-right').innerHTML=correctLeft?q.bSvg:q.aSvg;
  document.getElementById('label-left').textContent=correctLeft?q.aLabel:q.bLabel;
  document.getElementById('label-right').textContent=correctLeft?q.bLabel:q.aLabel;

  var hl=document.getElementById('half-left');
  var hr=document.getElementById('half-right');
  hl.className='card-half';
  hr.className='card-half';
  hl.style.pointerEvents='auto';
  hr.style.pointerEvents='auto';

  document.getElementById('feedback-row').innerHTML='';
  document.getElementById('next-btn').style.display='none';
  questionStartTime=Date.now();
}

function handleAnswer(side){
  if(answered)return;
  answered=true;
  var q=roundQuestions[qIndex];
  var isCorrect=(side===correctSide);
  var responseTimeSec=parseFloat(((Date.now()-questionStartTime)/1000).toFixed(2));

  document.getElementById('half-left').style.pointerEvents='none';
  document.getElementById('half-right').style.pointerEvents='none';

  if(isCorrect){
    document.getElementById('half-'+side).classList.add('correct-flash');
    roundScore++;
    document.getElementById('feedback-row').innerHTML='<div class="feedback-msg correct">\u2B50 That\'s right!</div>';
  } else {
    document.getElementById('half-'+side).classList.add('wrong-flash');
    document.getElementById('half-'+correctSide).classList.add('highlight-correct');
    document.getElementById('feedback-row').innerHTML='<div class="feedback-msg wrong">Good try! Look at the green one \u2014 that\'s the answer!</div>';
  }

  var tokensEarned=0;
  if(isCorrect&&roundScore===5){
    tokens++;
    tokensEarned=1;
    updateTokenBoard();
  }

  logAnswer(q,isCorrect,responseTimeSec,tokensEarned,side);
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  if(tokens>=5){showScreen('screen-reward');return;}
  qIndex++;
  if(qIndex>=5){showResult();return;}
  showQuestion();
}

// ── RESULT ───────────────────────────────────────────────────────────────────
function showResult(){
  roundNum++;
  showScreen('screen-result');
  document.getElementById('score-text').textContent='You got '+roundScore+' out of 5!';
  var pct=Math.round(roundScore/5*100);
  document.getElementById('score-bar').style.width=pct+'%';
  if(roundScore===5){document.getElementById('result-title').textContent='Perfect! Amazing!';}
  else if(roundScore>=3){document.getElementById('result-title').textContent='Great job!';}
  else{document.getElementById('result-title').textContent='Keep trying!';}
  var needed=5-tokens;
  document.getElementById('token-earned-msg').textContent=tokens>0
    ?'You have '+tokens+' token'+(tokens!==1?'s':'')+'. '+(needed>0?needed+' more for a video!':'You earned a video!')
    :'';
  updateTokenBoard();
}

// ── LOGGING ──────────────────────────────────────────────────────────────────
function logAnswer(q,correct,responseTimeSec,tokensEarned,side){
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,'0');};
  var dateStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  var timeStr=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  var answerGiven=document.getElementById('label-'+side).textContent;
  var payload={
    appSource:"math",
    date:dateStr,
    time:timeStr,
    category:q.cat,
    question:q.q+' ('+q.aLabel+' vs '+q.bLabel+')',
    correctAnswer:q.aLabel,
    answerGiven:answerGiven,
    correct:correct,
    responseTimeSec:responseTimeSec,
    tokensEarned:tokensEarned,
    sessionId:sessionId,
    isTest:isTest
  };
  fetch('https://jaloza.com/michael/iep/log.php',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(function(){});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateTokenBoard();
showScreen('screen-welcome');
</script>
