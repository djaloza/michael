<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Language Time">
<title>Language Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #F0FDF9; font-family: 'Nunito', sans-serif; overflow-x: hidden; }
  body { padding-bottom: env(safe-area-inset-bottom); }
  #app { max-width: 780px; margin: 0 auto; padding: 16px 20px 32px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .logo { font-size: 24px; font-weight: 900; color: #06D6A0; }
  .test-toggle { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; padding: 6px 14px; border-radius: 20px; border: 2px solid #DDE3F0; background: white; color: #9CA3AF; cursor: pointer; }
  .test-toggle.active { background: #FFF1F2; border-color: #EF476F; color: #9F1239; }
  .test-banner { background: #EF476F; border-radius: 0; padding: 4px 16px; font-size: 13px; font-weight: 800; color: white; text-align: center; margin: -16px -20px 10px; display: none; }
  .student-select { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 7px 14px; border-radius: 20px; border: 2px solid #DDE3F0; background: white; color: #6B7280; cursor: pointer; touch-action: manipulation; }
  .token-pill { display: flex; align-items: center; gap: 8px; background: #ECFDF5; padding: 8px 18px; border-radius: 40px; border: 2px solid #06D6A0; }
  .token-pill strong { font-size: 17px; color: #065F46; }
  .token-board { background: white; border-radius: 24px; border: 3px solid #D1FAE5; padding: 6px 16px; margin-bottom: 6px; }
  .token-board-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .token-board-label { font-size: 14px; font-weight: 800; color: #6B7280; }
  .token-board-msg { font-size: 14px; font-weight: 800; color: #06D6A0; }
  .token-circles { display: flex; gap: 8px; justify-content: center; }
  .token-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.35s; }
  .token-circle.empty { background: #F1EFE8; border: 4px solid #D3D1C7; }
  .token-circle.filled { background: #06D6A0; border: 4px solid #04a07a; box-shadow: 0 4px 12px rgba(6,214,160,0.45); transform: scale(1.08); }
  .card { background: white; border-radius: 24px; border: 3px solid #D1FAE5; padding: 20px; margin-bottom: 12px; }
  .big-btn { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; padding: 20px 52px; border-radius: 60px; border: none; cursor: pointer; min-height: 70px; touch-action: manipulation; color: white; width: 100%; }
  .big-btn.green { background: #06D6A0; box-shadow: 0 6px 0 #04a07a; }
  .big-btn.teal { background: #0D9488; box-shadow: 0 6px 0 #0A7C74; }
  .choice-grid-3 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .choice-grid-4 { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .choice-btn { border-radius: 20px; padding: 16px 14px; font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; text-align: center; touch-action: manipulation; border: 3px solid #D1FAE5; background: white; color: #2D2D2D; transition: background 0.15s; }
  .choice-btn.correct { background: #ECFDF5; border-color: #06D6A0; color: #065F46; }
  .choice-btn.wrong { background: #FFF1F2; border-color: #EF476F; color: #9F1239; }
  .choice-btn:disabled { cursor: default; }
  .feedback { border-radius: 20px; padding: 10px 16px; font-size: 17px; font-weight: 800; text-align: center; margin-top: 10px; display: none; }
  .feedback.correct { background: #ECFDF5; color: #065F46; }
  .feedback.wrong { background: #FFF1F2; color: #9F1239; }
  .next-btn { width: 100%; margin-top: 10px; background: #06D6A0; color: white; font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; padding: 14px; border-radius: 60px; border: none; cursor: pointer; box-shadow: 0 5px 0 #04a07a; min-height: 54px; touch-action: manipulation; display: none; }
  .type-badge { display: inline-block; font-size: 15px; font-weight: 800; padding: 6px 18px; border-radius: 24px; margin-bottom: 12px; }
  .badge-PRONOUNS { background: #EEF2FF; color: #4338CA; }
  .badge-PREPOSITIONS { background: #FEF3C7; color: #92400E; }
  .badge-FUNCTIONAL { background: #FFF1F2; color: #9F1239; }
  .badge-TURN { background: #F5F3FF; color: #5B21B6; }
  .q-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
  .q-dot { width: 16px; height: 16px; border-radius: 50%; background: #DDE3F0; transition: background 0.3s; }
  .q-dot.done { background: #06D6A0; }
  .q-dot.current { background: #0D9488; }
  .scene-svg { width: 100%; max-width: 340px; margin: 0 auto 12px; display: block; border-radius: 16px; border: 3px solid #D1FAE5; }
  .progress-bar-bg { width: 100%; max-width: 340px; margin: 0 auto 24px; height: 18px; background: #DDE3F0; border-radius: 9px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #06D6A0; border-radius: 9px; transition: width 1s ease-out; }
  .screen { display: none; }
  .screen.active { display: block; }
  .bounce { animation: bounce 2s infinite; display: inline-block; }
  .burst { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; font-size: 120px; z-index: 9999; animation: burst 0.8s ease-out forwards; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes burst { 0%{opacity:1;transform:scale(0.5)} 60%{opacity:1;transform:scale(1.3)} 100%{opacity:0;transform:scale(1.8)} }
  .pick-btn { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; border-radius:24px; padding:16px 20px; border:none; color:white; cursor:pointer; touch-action:manipulation; width:100%; margin:0; }
  .pick-story { background:#5B8DEF; box-shadow:0 5px 0 #3a6abf; }
  .pick-math  { background:#FF9F1C; box-shadow:0 5px 0 #c97a00; }
  .pick-lang  { background:#06D6A0; box-shadow:0 5px 0 #04a07a; }
  .pick-clock { background:#7B5EA7; box-shadow:0 5px 0 #5a4180; }
  .pick-shapes{ background:#EF476F; box-shadow:0 5px 0 #b8304f; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="https://jaloza.com/michael/" style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:#9CA3AF;text-decoration:none;">← Home</a>
      <div class="logo">🗣️ Language Time</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <select class="student-select" id="student-select" onchange="changeStudent(this.value)">
        <option value="Michael">👦 Michael</option>
        <option value="A">Student A</option>
        <option value="B">Student B</option>
      </select>
      <button class="test-toggle" id="test-toggle" onclick="toggleTestMode()">🧪 Test Mode</button>
      <div class="token-pill"><span style="font-size:20px">⭐</span><strong id="token-count">0/5</strong></div>
    </div>
  </div>
  <div class="test-banner" id="test-banner">🧪 TEST MODE — answers will NOT count toward real data</div>

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active" style="text-align:center;padding-top:12px;">
    <div class="bounce" style="font-size:96px;margin-bottom:16px;">🗣️</div>
    <div style="font-size:36px;font-weight:900;color:#06D6A0;margin-bottom:8px;">Hi Michael!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:6px;">Let's practice talking!</div>
    <div style="font-size:17px;color:#9CA3AF;font-weight:600;margin-bottom:28px;">Answer 1 question = 1 ⭐ · Fill 5 stars = 🎬 video!</div>
    <div id="welcome-token-board"></div>
    <button class="big-btn green" onclick="startRound()">Let's Go! 🚀</button>
  </div>

  <!-- QUESTION -->
  <div id="screen-question" class="screen">
    <div id="q-token-board"></div>
    <div class="q-dots" id="q-dots"></div>
    <div class="card">
      <div style="text-align:center;">
        <span class="type-badge" id="cat-badge">PRONOUNS</span>
      </div>
      <div id="scene-container" style="text-align:center;"></div>
      <div id="q-text" style="font-size:22px;font-weight:900;color:#2D2D2D;text-align:center;margin-bottom:16px;line-height:1.3;"></div>
      <div id="choice-grid"></div>
      <div id="feedback" class="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next ➡️</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen" style="text-align:center;padding-top:12px;">
    <div id="result-emoji" style="font-size:100px;margin-bottom:14px;display:inline-block;animation:bounce 1s ease-out;"></div>
    <div id="result-title" style="font-size:32px;font-weight:900;margin-bottom:8px;"></div>
    <div id="result-score" style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:24px;"></div>
    <div class="progress-bar-bg"><div id="result-bar" class="progress-bar-fill" style="width:0%;"></div></div>
    <div id="result-token-board"></div>
    <button class="big-btn green" onclick="startRound()">Play Again! 🗣️</button>
  </div>

  <!-- REWARD -->
  <div id="screen-reward" class="screen" style="text-align:center;padding-top:10px;">
    <div style="font-size:100px;margin-bottom:10px;">🎬</div>
    <div style="font-size:36px;font-weight:900;color:#06D6A0;margin-bottom:8px;">You earned a video!</div>
    <div style="font-size:20px;color:#6B7280;font-weight:600;margin-bottom:28px;">Awesome talking, Michael! 🎉</div>
    <div id="reward-stars" style="display:flex;gap:14px;justify-content:center;margin-bottom:28px;"></div>
    <div style="background:#ECFDF5;border-radius:22px;padding:24px 28px;margin-bottom:28px;">
      <div style="font-size:16px;color:#6B7280;font-weight:600;margin-bottom:6px;">Your video reward:</div>
      <div id="yt-label" style="font-size:20px;font-weight:800;color:#2D2D2D;margin-bottom:18px;"></div>
      <button onclick="openYouTube()" style="width:100%;background:#FF0000;color:white;font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;padding:18px;border-radius:60px;border:none;cursor:pointer;box-shadow:0 5px 0 #b00000;min-height:70px;touch-action:manipulation;">▶ Watch on YouTube!</button>
    </div>
    <button class="big-btn green" onclick="resetTokens();showScreen('welcome')">Keep Talking! 🗣️</button>
  </div>

  <!-- PICK NEXT -->
  <div id="screen-pick-next" class="screen" style="text-align:center;padding-top:12px;">
    <div style="font-size:28px;font-weight:900;color:#2D2D2D;margin-bottom:12px;">Round Complete! 🎉</div>
    <div id="pick-meta-board" style="margin-bottom:10px;"></div>
    <div id="pick-meta-count" style="font-size:17px;color:#06D6A0;font-weight:800;margin-bottom:20px;"></div>
    <div style="font-size:22px;font-weight:800;color:#2D2D2D;margin-bottom:16px;">What do you want to play next?</div>
    <div style="display:grid;grid-template-columns:1fr;gap:12px;max-width:420px;margin:0 auto;">
      <button onclick="pickNext('index.html')" class="pick-btn pick-story">📚 Story Time</button>
      <button onclick="pickNext('math.html')" class="pick-btn pick-math">📐 Math Time</button>
      <button onclick="pickNext('language.html')" class="pick-btn pick-lang">🗣️ Language Time</button>
      <button onclick="pickNext('clock.html')" class="pick-btn pick-clock">🕐 Clock Time</button>
      <button onclick="pickNext('shapes.html')" class="pick-btn pick-shapes">🔷 Shapes</button>
    </div>
  </div>
</div>

<script>
const TOKENS_NEEDED = 5;
const SESSION_ID = "la_" + Date.now();
const LOG_URL = "https://jaloza.com/michael/iep/log.php";
const VIDEO_SEARCHES = [
  "Bluey full episodes kids","Mario Bros cartoon for kids","Minecraft funny animation kids",
  "Pokemon cartoon episodes kids","SpongeBob funny moments","Paw Patrol episodes",
  "cartoon funny animals kids","funny video game cartoons kids"
];

// ── PRONOUN SVGs ──────────────────────────────────────────────
function skyGrass() {
  return `<rect width="280" height="160" fill="#E3F4FF"/><rect y="120" width="280" height="40" fill="#7BC67E"/>`;
}
function boyFigure(cx, cy, action) {
  // Blue shirt stick figure with short hair cap
  const hx = cx, hy = cy - 30;
  let html = `<circle cx="${hx}" cy="${hy}" r="12" fill="#FFDDB3"/>
    <rect x="${hx-8}" y="${hy-14}" width="16" height="8" rx="4" fill="#555"/>
    <rect x="${hx-10}" y="${hy+12}" width="20" height="18" rx="3" fill="#4A90D9"/>`;
  if (action === 'run') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-10}" y2="${hy+50}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+12}" y2="${hy+44}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+16}" y2="${hy+30}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'jump') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-12}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+12}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-20}" y2="${hy+28}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+20}" y2="${hy+28}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'read') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <rect x="${hx+10}" y="${hy+14}" width="22" height="16" rx="2" fill="#FF9F1C"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+10}" y2="${hy+18}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+20}" y2="${hy+30}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'eat') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <circle cx="${hx+18}" cy="${hy+16}" r="6" fill="#FF6B6B"/>
      <line x1="${hx+5}" y1="${hy+18}" x2="${hx+18}" y2="${hy+16}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+30}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'sleep') {
    html += `<rect x="${hx-30}" y="${hy+22}" width="60" height="14" rx="6" fill="#BDBDBD"/>
      <text x="${hx+10}" y="${hy+12}" font-size="14" fill="#9B59B6">z z</text>`;
  } else if (action === 'climb') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-20}" y2="${hy+12}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+20}" y2="${hy+28}" stroke="#333" stroke-width="3"/>
      <rect x="${hx+22}" y="${hy}" width="8" height="60" rx="4" fill="#795548"/>`;
  } else if (action === 'kick') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+24}" y2="${hy+44}" stroke="#333" stroke-width="3"/>
      <circle cx="${hx+36}" cy="${hy+46}" r="8" fill="#1565C0"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+18}" y2="${hy+28}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'write') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <rect x="${hx+10}" y="${hy+22}" width="22" height="16" rx="2" fill="#E3F4FF"/>
      <line x1="${hx+8}" y1="${hy+24}" x2="${hx+30}" y2="${hy+32}" stroke="#333" stroke-width="2"/>
      <line x1="${hx+5}" y1="${hy+18}" x2="${hx+14}" y2="${hy+24}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'throw') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <circle cx="${hx+38}" cy="${hy+8}" r="8" fill="#FF9F1C"/>
      <line x1="${hx+5}" y1="${hy+16}" x2="${hx+32}" y2="${hy+10}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>`;
  } else {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>`;
  }
  return html;
}
function girlFigure(cx, cy, action) {
  const hx = cx, hy = cy - 30;
  let html = `<circle cx="${hx}" cy="${hy}" r="12" fill="#FFDDB3"/>
    <path d="M${hx-12},${hy-4} Q${hx-18},${hy+14} ${hx-14},${hy+24}" stroke="#9B59B6" stroke-width="4" fill="none"/>
    <path d="M${hx+12},${hy-4} Q${hx+18},${hy+14} ${hx+14},${hy+24}" stroke="#9B59B6" stroke-width="4" fill="none"/>
    <rect x="${hx-10}" y="${hy+12}" width="20" height="18" rx="3" fill="#9B59B6"/>`;
  if (action === 'run') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-12}" y2="${hy+50}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+10}" y2="${hy+44}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+30}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+14}" y2="${hy+28}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'read') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+8}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <rect x="${hx+10}" y="${hy+14}" width="22" height="16" rx="2" fill="#FF9F1C"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+10}" y2="${hy+18}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-18}" y2="${hy+32}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'jump') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-12}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+12}" y2="${hy+52}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-20}" y2="${hy+28}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+20}" y2="${hy+28}" stroke="#333" stroke-width="3"/>`;
  } else if (action === 'swim') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-16}" y2="${hy+42}" stroke="#333" stroke-width="3"/>
      <line x1="${hx}" y1="${hy+30}" x2="${hx+16}" y2="${hy+42}" stroke="#333" stroke-width="3"/>
      <line x1="${hx-5}" y1="${hy+20}" x2="${hx-24}" y2="${hy+18}" stroke="#333" stroke-width="3"/>
      <line x1="${hx+5}" y1="${hy+20}" x2="${hx+24}" y2="${hy+18}" stroke="#333" stroke-width="3"/>
      <rect x="${hx-40}" y="${hy+38}" width="80" height="12" rx="4" fill="#29B6F6" opacity="0.5"/>`;
  } else if (action === 'dance') {
    html += `<line x1="${hx}" y1="${hy+30}" x2="${hx-14}" y2="${hy+50}" stroke="#333" stroke-width="3"/>

// ── STATE ─────────────────────────────────────────────────────
let tokens = 0;
let roundQuestions = [];
let currentQ = 0;
let correctCount = 0;
let answered = false;
let questionStartTime = null;
let currentSearch = '';
let isTestMode = false;
let currentStudent = 'Michael';
let roundNum = 0;

// Pools for without-repeat drawing
let pronounPool = [], prepPool = [], funcPool = [], turnPool = [];

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawFromPool(pool, source, count) {
  while (pool.length < count) pool.push(...shuffleArr(source));
  return pool.splice(0, count);
}

function buildRound() {
  const pronouns  = drawFromPool(pronounPool, PRONOUN_SCENES, 2);
  const prep      = drawFromPool(prepPool, PREP_SCENES, 1)[0];
  const func      = drawFromPool(funcPool, FUNC_SCENARIOS, 1)[0];
  const turn      = drawFromPool(turnPool, TURN_SCENES, 1)[0];
  return shuffleArr([
    ...pronouns.map(s => ({...s, mode:'pronouns', goalCode:'SLP1', numChoices:3})),
    {...prep,     mode:'prepositions',    goalCode:'SLP2', numChoices:4},
    {...func,     mode:'functional_comm', goalCode:'SLP3', numChoices:3},
    {...turn,     mode:'turn_taking',     goalCode:'SLP4', numChoices:3}
  ]);
}

// ── SCREENS ───────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0,0);
}

// ── TOKEN BOARD ───────────────────────────────────────────────
function renderTokenBoard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (localStorage.getItem('tokenMode') === 'session') { el.innerHTML = ''; return; }
  const left = TOKENS_NEEDED - tokens;
  el.innerHTML = `<div class="token-board">
    <div class="token-board-header">
      <span class="token-board-label">TOKEN BOARD</span>
      <span class="token-board-msg">${tokens >= TOKENS_NEEDED ? '🎬 Video time!' : left + ' more for your video!'}</span>
    </div>
    <div class="token-circles">
      ${Array.from({length:TOKENS_NEEDED},(_,i)=>`<div class="token-circle ${i<tokens?'filled':'empty'}">${i<tokens?'⭐':''}</div>`).join('')}
    </div>
  </div>`;
}

function updateTokenPill() {
  document.getElementById('token-count').textContent = tokens+'/'+TOKENS_NEEDED;
}

function giveToken() {
  if (tokens < TOKENS_NEEDED) tokens++;
  updateTokenPill();
  renderTokenBoard('q-token-board');
  const burst = document.createElement('div');
  burst.className='burst'; burst.textContent='⭐'; document.body.appendChild(burst);
  setTimeout(()=>burst.remove(), 900);
  if (tokens >= TOKENS_NEEDED && localStorage.getItem('tokenMode')!=='session') setTimeout(showReward,1100);
}

function resetTokens() { tokens=0; updateTokenPill(); }

// ── ROUND ─────────────────────────────────────────────────────
function startRound() {
  roundNum++;
  roundQuestions = buildRound();
  currentQ = 0; correctCount = 0; answered = false;
  renderQuestion();
  showScreen('question');
}

function renderQuestion() {
  const q = roundQuestions[currentQ];
  renderTokenBoard('q-token-board');
  document.getElementById('q-dots').innerHTML = roundQuestions.map((_,i)=>
    `<div class="q-dot ${i<currentQ?'done':i===currentQ?'current':''}"></div>`
  ).join('');

  const badge = document.getElementById('cat-badge');
  const modeLabels = {pronouns:'🗣️ PRONOUNS', prepositions:'📍 PREPOSITIONS', functional_comm:'💬 COMMUNICATION', turn_taking:'🎲 TURN TAKING'};
  const modeClasses = {pronouns:'PRONOUNS', prepositions:'PREPOSITIONS', functional_comm:'FUNCTIONAL', turn_taking:'TURN'};
  badge.textContent = modeLabels[q.mode] || q.mode.toUpperCase();
  badge.className = 'type-badge badge-' + (modeClasses[q.mode] || 'PRONOUNS');

  // Scene
  document.getElementById('scene-container').innerHTML = q.svg || '';
  document.getElementById('q-text').textContent = q.question || q.scenario || 'What is happening in this picture?';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  // Build shuffled choices
  let choices;
  if (q.numChoices === 4) {
    choices = shuffleArr([{l:q.correct,c:true}, ...q.wrong.map(w=>({l:w,c:false}))]);
    document.getElementById('choice-grid').className = 'choice-grid-4';
  } else {
    choices = shuffleArr([{l:q.correct,c:true},{l:q.wrong1,c:false},{l:q.wrong2,c:false}]);
    document.getElementById('choice-grid').className = 'choice-grid-3';
  }
  q._shuffledChoices = choices;

  document.getElementById('choice-grid').innerHTML = choices.map((c,i)=>
    `<button class="choice-btn" id="ch-${i}" onclick="handleAnswer(${c.c},${i},'${q.mode}','${q.goalCode}')">${c.l}</button>`
  ).join('');

  answered = false;
  questionStartTime = Date.now();
}

function handleAnswer(isCorrect, idx, mode, goalCode) {
  if (answered) return;
  answered = true;
  giveToken();

  const q = roundQuestions[currentQ];
  const choices = q._shuffledChoices;
  const chosenLabel = choices[idx].l;
  const responseTimeSec = Math.round((Date.now() - questionStartTime) / 1000);

  choices.forEach((c,i) => {
    const btn = document.getElementById('ch-'+i);
    btn.disabled = true;
    if (i===idx) btn.classList.add(c.c?'correct':'wrong');
    else if (c.c) btn.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  const nb = document.getElementById('next-btn');
  if (isCorrect) {
    correctCount++;
    fb.className='feedback correct';
    fb.textContent='⭐ Great talking!';
    showBurst();
  } else {
    const correct = choices.find(c=>c.c);
    fb.className='feedback wrong';
    fb.textContent='Good try! The answer is: '+correct.l;
  }
  fb.style.display='block';

  logAnswer(mode, goalCode, q.question || q.scenario || 'What is happening in this picture?', chosenLabel, isCorrect, responseTimeSec);

  nb.textContent = currentQ < roundQuestions.length-1 ? 'Next ➡️' : 'See My Score! 🏆';
  nb.style.display='block';
}

function nextQuestion() {
  currentQ++;
  answered=false;
  if (currentQ < roundQuestions.length) renderQuestion();
  else if (localStorage.getItem('tokenMode')==='session') sessionRoundComplete();
  else showResult();
}

function showBurst() {
  const el = document.createElement('div');
  el.className='burst'; el.textContent='⭐'; document.body.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

// ── RESULT ────────────────────────────────────────────────────
function showResult() {
  const total = roundQuestions.length;
  const pct = Math.round((correctCount/total)*100);
  document.getElementById('result-emoji').textContent = pct>=80?'🏆':pct>=60?'🌟':'💪';
  document.getElementById('result-title').textContent = pct>=80?'Amazing talking, Michael!':pct>=60?'Great job, Michael!':'Keep practicing, Michael!';
  document.getElementById('result-score').textContent = 'You got '+correctCount+' out of '+total+' right!';
  renderTokenBoard('result-token-board');
  showScreen('result');
  setTimeout(()=>{ document.getElementById('result-bar').style.width=pct+'%'; },100);
}

// ── REWARD ────────────────────────────────────────────────────
function showReward() {
  currentSearch = VIDEO_SEARCHES[Math.floor(Math.random()*VIDEO_SEARCHES.length)];
  document.getElementById('yt-label').textContent = '"'+currentSearch+'"';
  document.getElementById('reward-stars').innerHTML = Array.from({length:TOKENS_NEEDED}).map(()=>
    `<div style="width:64px;height:64px;border-radius:50%;background:#06D6A0;border:4px solid #04a07a;display:flex;align-items:center;justify-content:center;font-size:32px;">⭐</div>`
  ).join('');
  showScreen('reward');
}

function openYouTube() {
  window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(currentSearch)+'&sp=EgIYAQ%3D%3D','_blank');
}

function sessionRoundComplete() {
  tokens=0; updateTokenPill();
  const meta = parseInt(localStorage.getItem('metaTokens')||'0')+1;
  if (meta>=5) {
    localStorage.setItem('metaTokens','5');
    window.location.href='../';
  } else {
    localStorage.setItem('metaTokens',meta);
    const left=5-meta;
    document.getElementById('pick-meta-board').innerHTML =
      '<div style="display:flex;gap:10px;justify-content:center;">' +
      Array.from({length:5},(_,i)=>`<div style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;${i<meta?'background:#06D6A0;border:4px solid #04a07a;':'background:#F1EFE8;border:4px solid #D3D1C7;'}">${i<meta?'⭐':''}</div>`).join('')+
      '</div>';
    document.getElementById('pick-meta-count').textContent = meta+' of 5 rounds done · '+left+' more for your video!';
    showScreen('pick-next');
  }
}

function pickNext(url) {
  localStorage.setItem('launchDirect','1');
  window.location.href=url;
}

// ── TEST MODE ─────────────────────────────────────────────────
function toggleTestMode() {
  isTestMode=!isTestMode;
  document.getElementById('test-toggle').classList.toggle('active',isTestMode);
  document.getElementById('test-banner').style.display=isTestMode?'block':'none';
}

function changeStudent(val) {
  currentStudent=val;
}

// ── LOGGING ───────────────────────────────────────────────────
function logAnswer(mode, goalCode, question, answerGiven, correct, responseTimeSec) {
  if (currentStudent!=='Michael' || isTestMode) return;
  const now = new Date();
  const payload = {
    appSource: "language",
    goalCode: goalCode,
    mode: mode,
    date: now.toLocaleDateString("en-US"),
    time: now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
    question: question,
    answerGiven: answerGiven,
    correct: correct,
    responseTimeSec: responseTimeSec,
    tokensEarned: tokens,
    sessionId: SESSION_ID
  };
  fetch(LOG_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────
renderTokenBoard('welcome-token-board');
updateTokenPill();
if (localStorage.getItem('launchDirect')==='1') {
  localStorage.removeItem('launchDirect');
  startRound();
}
</script>
</body>
</html>
