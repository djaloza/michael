<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Michael's Apps">
<title>Michael's Learning Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #FFF8F0; font-family: 'Nunito', sans-serif; overflow-x: hidden; }

  .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }

  /* WELCOME SCREEN */
  #screen-welcome { text-align: center; }
  .hero-emoji { font-size: 100px; margin-bottom: 16px; animation: bounce 2s infinite; display: inline-block; }
  .hero-title { font-size: 48px; font-weight: 900; color: #5B8DEF; margin-bottom: 8px; }
  .hero-sub { font-size: 22px; color: #6B7280; font-weight: 600; margin-bottom: 48px; }
  .card-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 500px; }
  .app-card { border-radius: 28px; padding: 32px 24px; text-align: center; cursor: pointer; border: none; font-family: 'Nunito', sans-serif; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 12px; touch-action: manipulation; transition: transform 0.15s, box-shadow 0.15s; }
  .app-card:active { transform: scale(0.97); }
  .app-card .card-emoji { font-size: 72px; }
  .app-card .card-title { font-size: 28px; font-weight: 900; color: white; }
  .app-card .card-desc { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.85); }
  .card-story { background: #5B8DEF; box-shadow: 0 8px 0 #3a6abf; }
  .card-math  { background: #FF9F1C; box-shadow: 0 8px 0 #c97a00; }
  .card-data  { background: #7B5EA7; box-shadow: 0 8px 0 #5a4180; }

  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  @keyframes fadein { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .fadein { animation: fadein 0.4s ease-out; }
</style>
</head>
<body>

<!-- WELCOME -->
<div class="page" id="screen-welcome">
  <div class="hero-emoji">⭐</div>
  <div class="hero-title">Hi Michael!</div>
  <div class="hero-sub">What do you want to do today?</div>
  <div class="card-grid">
    <a class="app-card card-story" href="storytime/">
      <span class="card-emoji">📚</span>
      <span class="card-title">Story Time</span>
      <span class="card-desc">Read stories · Answer questions · Earn stars!</span>
    </a>
    <a class="app-card card-math" href="storytime/math.html">
      <span class="card-emoji">📐</span>
      <span class="card-title">Math Time</span>
      <span class="card-desc">Compare things · Longer · Wider · More!</span>
    </a>
    <a class="app-card card-data" href="iep/dashboard.php">
      <span class="card-emoji">📊</span>
      <span class="card-title">Look at Data</span>
      <span class="card-desc">See how Michael is doing!</span>
    </a>
  </div>
</div>

</body>
</html>
